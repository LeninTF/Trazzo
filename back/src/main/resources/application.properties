spring.application.name=back
spring.h2.console.enabled=false
spring.h2.console.settings.web-allow-others=false

# AES-256-GCM key for encrypting tenant DB passwords (Base64-encoded 32 bytes).
# Production/CI: set APP_ENCRYPTION_KEY environment variable.
# Local dev: run with -Dspring.profiles.active=local (see application-local.properties).
app.encryption.key=${APP_ENCRYPTION_KEY}

# Master DataSource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/master_db}
spring.datasource.username=${DB_USER:trazzo_app}
# Set via env var DB_PASSWORD (local dev: use -Dspring.profiles.active=local)
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway: migraciones del master DB (db/migration/V*__*.sql)
spring.flyway.locations=classpath:db/master
spring.session.jdbc.initialize-schema=never

# Cloudflare R2 (S3-compatible)
# Empty defaults allow the app to start without R2 configured (local dev).
# When the endpoint is blank, storage beans are not created.
cloudflare.r2.endpoint=${CLOUDFLARE_R2_ENDPOINT:}
cloudflare.r2.region=${CLOUDFLARE_R2_REGION:}
cloudflare.r2.access-key-id=${CLOUDFLARE_R2_ACCESS_KEY_ID:}
cloudflare.r2.secret-access-key=${CLOUDFLARE_R2_SECRET_ACCESS_KEY:}
cloudflare.r2.bucket-name=${CLOUDFLARE_R2_BUCKET_NAME:}
cloudflare.r2.public-url=${CLOUDFLARE_R2_PUBLIC_URL:}

# Mercado Pago Suscripciones (Preapproval API)
# Empty defaults allow the app to start without it configured (local dev without a token).
# webhook-secret is blank until the notification URL is configured in the MP dashboard —
# MercadoPagoWebhookController must reject all notifications while it's blank, never process
# unsigned/unverifiable webhooks even in dev.
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.public-key=${MERCADOPAGO_PUBLIC_KEY:}
mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET:}

# Where Mercado Pago's hosted checkout redirects the payer's browser back to after a
# preapproval is authorized (back_url). Angular dev server default; override in prod.
app.frontend-url=${FRONTEND_URL:https://trazzosaas.noahtechperu.com}

# /shop trial tenants that never get their payment confirmed by Mercado Pago are purged this
# many hours after creation, on this cron schedule (default: hourly).
trazzo.shop.abandoned-trial-hours=${ABANDONED_TRIAL_HOURS:1}
trazzo.shop.abandoned-trial-cleanup-cron=${ABANDONED_TRIAL_CLEANUP_CRON:0 0 * * * *}

# DataSeeder also requires @Profile("local") to be instantiated at all, so this is inert
# unless SPRING_PROFILES_ACTIVE=local is set — kept false here as defense in depth against
# that ever happening by mistake in a real deploy. application-local.properties sets it to
# true for local dev.
trazzo.seed.admin.enabled=false

# JWT: secret HMAC-256 en Base64 (mínimo 32 bytes). Production: set APP_JWT_SECRET env var.
# Local dev: agregar app.jwt.secret=<valor> en application-local.properties
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000

# Resend (transactional email): no Trazzo account exists yet, so this is intentionally left
# unset. ResendEmailAdapter logs a warning and skips sending when the key is blank, rather
# than failing the request/comment operation that triggered the notification.
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:notificaciones@trazzo.pe}
trazzo.requests.notification-email=${REQUESTS_NOTIFICATION_EMAIL:solicitudes@trazzo.pe}

# Server context path
server.servlet.context-path=/api/v1

# Management server port (for actuator endpoints), Solo expone el endpoint 'health' y 'info' (por seguridad)

management.server.port=8081
management.endpoints.web.exposure.include=health,info
# "always" let anyone unauthenticated see full health detail (DB status, disk space, etc.) —
# only an authenticated request now sees the breakdown; anonymous requests get bare UP/DOWN.
management.endpoint.health.show-details=when-authorized
