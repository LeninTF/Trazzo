spring.application.name=back

# Carga configuración local del desarrollador (no se sube a git)
spring.config.import=optional:classpath:application-local.properties

# ── Base de Datos ──────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/trazzo_db}
spring.datasource.username=${DB_USERNAME:trazzo}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false

# ── Spring Session (desactivada: usamos JWT sin estado) ────────────────────────
spring.session.store-type=none

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ── CORS ───────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

# ── Seguridad: protección contra fuerza bruta ──────────────────────────────────
security.max-failed-attempts=${MAX_FAILED_ATTEMPTS:5}
security.lockout-duration-minutes=${LOCKOUT_DURATION_MINUTES:30}

# ── Actuator ───────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
