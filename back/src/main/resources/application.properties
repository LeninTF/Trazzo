spring.application.name=back

# AES-256-GCM key for encrypting tenant DB passwords (Base64-encoded 32 bytes).
# MUST be overridden in production via the APP_ENCRYPTION_KEY environment variable.
app.encryption.key=${APP_ENCRYPTION_KEY}

# Master DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/master_db
spring.datasource.username=trazzo_app
spring.datasource.password=changeme
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway: migraciones del master DB (db/migration/V*__*.sql)
spring.flyway.locations=classpath:db/migration
spring.session.jdbc.initialize-schema=never

# Tenant schema provisioning (PostgreSQL superuser para CREATE DATABASE / CREATE USER)
trazzo.provisioning.admin-url=jdbc:postgresql://localhost:5432/postgres
trazzo.provisioning.admin-username=postgres
trazzo.provisioning.admin-password=changeme
trazzo.provisioning.db-host=localhost
trazzo.provisioning.db-port=5432
