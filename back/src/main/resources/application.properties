spring.application.name=back
spring.h2.console.enabled=false
spring.h2.console.settings.web-allow-others=false

# AES-256-GCM key for encrypting tenant DB passwords (Base64-encoded 32 bytes).
# Production/CI: set APP_ENCRYPTION_KEY environment variable.
# Local dev: run with -Dspring.profiles.active=local (see application-local.properties).
app.encryption.key=${APP_ENCRYPTION_KEY}

# Master DataSource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/master_db}
spring.datasource.username=${DB_USER:trazzo_app}
# Set via env var DB_PASSWORD (local dev: use -Dspring.profiles.active=local)
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway: migraciones del master DB (db/migration/V*__*.sql)
spring.flyway.locations=classpath:db/migration
spring.session.store-type=none

# JWT: secret must be a Base64-encoded key of at least 256 bits.
# Production/CI: set APP_JWT_SECRET environment variable.
# Local dev: run with -Dspring.profiles.active=local (see application-local.properties).
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000

# Tenant schema provisioning (PostgreSQL superuser para CREATE DATABASE / CREATE USER)
trazzo.provisioning.admin-url=${PROVISIONING_ADMIN_URL:jdbc:postgresql://localhost:5432/postgres}
trazzo.provisioning.admin-username=${PROVISIONING_ADMIN_USER:postgres}
trazzo.provisioning.admin-password=${PROVISIONING_ADMIN_PASSWORD}
trazzo.provisioning.db-host=${PROVISIONING_DB_HOST:localhost}
trazzo.provisioning.db-port=${PROVISIONING_DB_PORT:5432}
