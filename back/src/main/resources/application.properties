spring.application.name=back
spring.h2.console.enabled=false
spring.h2.console.settings.web-allow-others=false

# AES-256-GCM key for encrypting tenant DB passwords (Base64-encoded 32 bytes).
# Production/CI: set APP_ENCRYPTION_KEY environment variable.
# Local dev: run with -Dspring.profiles.active=local (see application-local.properties).
app.encryption.key=${APP_ENCRYPTION_KEY}

# Master DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/master_db
spring.datasource.username=trazzo_app
# Set via env var DB_PASSWORD (local dev: use -Dspring.profiles.active=local)
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway: migraciones del master DB (db/migration/V*__*.sql)
spring.flyway.locations=classpath:db/migration
spring.session.jdbc.initialize-schema=never

# Tenant schema provisioning (PostgreSQL superuser para CREATE DATABASE / CREATE USER)
trazzo.provisioning.admin-url=jdbc:postgresql://localhost:5432/postgres
trazzo.provisioning.admin-username=postgres
trazzo.provisioning.admin-password=${PROVISIONING_ADMIN_PASSWORD}
trazzo.provisioning.db-host=localhost
trazzo.provisioning.db-port=5432

# Cloudflare R2 (S3-compatible)
cloudflare.r2.endpoint=${CLOUDFLARE_R2_ENDPOINT}
cloudflare.r2.region=${CLOUDFLARE_R2_REGION:auto}
cloudflare.r2.access-key-id=${CLOUDFLARE_R2_ACCESS_KEY_ID}
cloudflare.r2.secret-access-key=${CLOUDFLARE_R2_SECRET_ACCESS_KEY}
cloudflare.r2.bucket-name=${CLOUDFLARE_R2_BUCKET_NAME}
cloudflare.r2.public-url=${CLOUDFLARE_R2_PUBLIC_URL:}
