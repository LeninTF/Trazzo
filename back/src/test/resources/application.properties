# Clave AES-256 de prueba (32 bytes de cero — solo para tests, no usar en producción)
app.encryption.key=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

# Flyway y Spring Session deshabilitados en tests (DataSource es mock, no hay BD real)
spring.flyway.enabled=false
spring.session.jdbc.initialize-schema=never

# Requerido por ProvisioningProperties para que el contexto pueda arrancar
trazzo.provisioning.admin-url=jdbc:postgresql://localhost:5432/postgres
trazzo.provisioning.admin-username=test
trazzo.provisioning.admin-password=test
trazzo.provisioning.db-host=localhost
trazzo.provisioning.db-port=5432
