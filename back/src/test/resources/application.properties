spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false
spring.h2.console.settings.web-allow-others=false

# Clave AES-256 de prueba (32 bytes de 0x01; solo para tests, no usar en produccion)
app.encryption.key=AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=

# Flyway y Spring Session deshabilitados en tests (DataSource es mock, no hay BD real)
spring.flyway.enabled=false
spring.session.store-type=none

# JWT: secret HMAC-256 en Base64. Fallback seguro de 32 bytes para tests (solo tests, no usar en produccion).
app.jwt.secret=${APP_JWT_SECRET:AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=}
app.jwt.expiration-ms=86400000

# Requerido por ProvisioningProperties para que el contexto pueda arrancar
trazzo.provisioning.admin-url=jdbc:postgresql://localhost:5432/postgres
trazzo.provisioning.admin-username=test
trazzo.provisioning.admin-password=test
trazzo.provisioning.db-host=localhost
trazzo.provisioning.db-port=5432
