spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false
spring.h2.console.settings.web-allow-others=false

# Clave AES-256 de prueba (32 bytes de 0x01; solo para tests, no usar en produccion)
app.encryption.key=AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=

# Flyway y Spring Session deshabilitados en tests (DataSource es mock, no hay BD real)
spring.flyway.enabled=false
spring.session.jdbc.initialize-schema=never

# Requerido por ProvisioningProperties para que el contexto pueda arrancar
trazzo.provisioning.admin-url=jdbc:postgresql://localhost:5432/postgres
trazzo.provisioning.admin-username=test
trazzo.provisioning.admin-password=test
trazzo.provisioning.db-host=localhost
trazzo.provisioning.db-port=5432

# Cloudflare R2 (valores dummy para tests de contexto Spring)
cloudflare.r2.endpoint=http://localhost:9000
cloudflare.r2.region=auto
cloudflare.r2.access-key-id=test-key
cloudflare.r2.secret-access-key=test-secret
cloudflare.r2.bucket-name=test-bucket
cloudflare.r2.public-url=http://localhost:9000/test-bucket
