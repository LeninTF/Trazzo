# Configuración para el contexto de tests — sobreescribe application.properties
# Usa H2 en memoria para evitar dependencia de PostgreSQL en CI.

# Valores para los placeholders ${...} del application.properties principal
DB_URL=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
DB_USERNAME=sa
DB_PASSWORD=
JWT_SECRET=test-secret-key-for-ci-unit-tests-minimum-32-chars
JPA_DDL_AUTO=create-drop
SHOW_SQL=false
CORS_ALLOWED_ORIGINS=http://localhost:4200
MAX_FAILED_ATTEMPTS=5
LOCKOUT_DURATION_MINUTES=30

# Driver y dialecto específicos de H2 (reemplazan los de PostgreSQL)
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Desactiva Spring Session JDBC explícitamente en tests
spring.session.store-type=none
