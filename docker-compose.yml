version: '3.8'

services:
  trazzo-backend:
    # 1. Se descarga la imagen del registro.
    image: ghcr.io/lenintf/trazzo/trazzo-back:main
    container_name: trazzo-backend
    restart: unless-stopped
    ports:
      - "8080:8080" # Acceso directo al backend para esta fase temprana sin tunnel
    env_file:
      - .env # Aqui se inyectan las credenciales de BD y JWT en produccion
    networks:
      - trazzo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  trazzo-frontend:
    image: ghcr.io/lenintf/trazzo/trazzo-front:main
    container_name: trazzo-frontend
    restart: unless-stopped
    ports:
      - "4000:8080"
    networks:
      - trazzo-network
    depends_on:
      trazzo-backend:
        condition: service_healthy # Espera a que Spring Boot este 100% arriba para iniciar

  # TODO: Reactivar este servicio cuando volvamos a exponer el stack por Cloudflare Tunnel.
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: trazzo-tunnel
  #   restart: unless-stopped
  #   command: tunnel run
  #   environment:
  #     - TUNNEL_TOKEN=${TUNNEL_TOKEN} # Token del tunel (Cloudflare). Definirlo en .env o como variable de entorno del host.
  #   networks:
  #     - trazzo-network

networks:
  trazzo-network:
    driver: bridge
