services:
  camera:
    build: .
    ports:
      - "9002:9002"
    volumes:
      - ./models:/app/models
      - camera-db:/data
    environment:
      CAMERA_INDEX: "0"
      CAMERA_BACKEND: v4l2
      WEBSOCKET_HOST: "0.0.0.0"
      WEBSOCKET_PORT: "9002"
      MODELS_DIR: /app/models
      DB_PATH: /data/faces.db
    restart: unless-stopped

volumes:
  camera-db:
