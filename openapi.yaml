                $ref: '#/components/schemas/ErrorResponse'

  # ────────────────────────────────────────────────────────────────────
  # USER SCHEDULES (Asignaciones de schedule a trabajador)
  # ────────────────────────────────────────────────────────────────────
  /corehr/user-schedules:
    get:
      tags:
        - CoreHR · UserSchedules
      summary: Listar asignaciones de schedule
      operationId: listUserSchedules
      description: |
        Devuelve asignaciones de schedules a trabajadores.
        Soporta filtro por `tenant_user_id` para ver los schedules de un trabajador específico.
        **Permisos requeridos:** `MANAGE_USER_SHIFTS`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - name: tenant_user_id
          in: query
          required: false
          description: "Filtra asignaciones de un trabajador específico."
          schema:
            type: integer
        - name: schedule_id
          in: query
          required: false
          description: "Filtra asignaciones de un schedule específico."
          schema:
            type: integer
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        "200":
          description: Lista paginada de asignaciones.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserScheduleListResponse'
        "403":
          description: Sin permiso `MANAGE_USER_SHIFTS`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - CoreHR · UserSchedules
      summary: Asignar un schedule a un trabajador
      operationId: createUserSchedule
      description: |
        Asigna un schedule a un trabajador.

        **Nota:** si el trabajador no tenía ningún schedule asignado previamente,
        el backend dispara notificación WebSocket + email al admin con `MANAGE_USER_SHIFTS`
        para confirmar la asignación inicial.

        Si el trabajador ya tenía un schedule asignado, la nueva asignación coexiste
        (un trabajador puede tener múltiples schedules activos simultáneamente).

        **Permisos requeridos:** `MANAGE_USER_SHIFTS`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserScheduleRequest'
      responses:
        "201":
          description: Asignación creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserScheduleProfile'
        "403":
          description: Sin permiso `MANAGE_USER_SHIFTS`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: "`tenant_user_id` o `schedule_id` no encontrado en este tenant."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: El trabajador no está `ACTIVO` (no se puede asignar schedule a usuarios en `LICENCIA` o `INACTIVO`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /corehr/user-schedules/{id}:
    parameters:
      - $ref: '#/components/parameters/UserScheduleId'
      - $ref: '#/components/parameters/TenantIdHeader'

    delete:
      tags:
        - CoreHR · UserSchedules
      summary: Eliminar una asignación de schedule
      operationId: deleteUserSchedule
      description: |
        Elimina la asignación de schedule a un trabajador. Eliminación física.
        **Permisos requeridos:** `MANAGE_USER_SHIFTS`
      responses:
        "204":
          description: Asignación eliminada.
        "403":
          description: Sin permiso `MANAGE_USER_SHIFTS`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Asignación no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ────────────────────────────────────────────────────────────────────
  # DEVICES (Dispositivos biométricos)
  # ────────────────────────────────────────────────────────────────────
  /corehr/devices:
    get:
      tags:
        - CoreHR · Devices
      summary: Listar dispositivos del tenant
      operationId: listDevices
      description: |
        Devuelve dispositivos biométricos registrados en el tenant.
        Filtrable por sede (`branch_id`) y por estado (`state`).
        Cacheado en Redis (`devices:{tenant_id}`, TTL 5 min).

        **Permisos requeridos:** `MANAGE_DEVICES`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/BranchIdParam'
        - name: state
          in: query
          required: false
          description: "Filtra por estado del dispositivo."
          schema:
            type: boolean
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        "200":
          description: Lista paginada de dispositivos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceListResponse'
        "403":
          description: Sin permiso `MANAGE_DEVICES`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - CoreHR · Devices
      summary: Registrar un nuevo dispositivo biométrico
      operationId: createDevice
      description: |
        Registra un dispositivo ZKTeco en el tenant.
        El `code` (serial) debe ser único en el tenant.
        Invalida caché Redis de devices.

        **Acceso:** admin del tenant con `MANAGE_DEVICES` **o** usuario Trazzo con `MANAGE_DEVICES`.
        **Permisos requeridos:** `MANAGE_DEVICES`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeviceRequest'
      responses:
        "201":
          description: Dispositivo registrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceProfile'
        "403":
          description: Sin permiso `MANAGE_DEVICES`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: El `code` (serial) ya está registrado en este tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: "`branch_id` no pertenece a este tenant."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /corehr/devices/{id}:
    parameters:
      - $ref: '#/components/parameters/DeviceId'
      - $ref: '#/components/parameters/TenantIdHeader'

    get:
      tags:
        - CoreHR · Devices
      summary: Obtener un dispositivo por ID
      operationId: getDeviceById
      description: |
        **Permisos requeridos:** `MANAGE_DEVICES`
      responses:
        "200":
          description: Dispositivo encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceProfile'
        "404":
          description: Dispositivo no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags:
        - CoreHR · Devices
      summary: Actualizar parcialmente un dispositivo
      operationId: patchDevice
      description: |
        Actualiza campos del dispositivo. `code` (serial) no es modificable.

        **Caso crítico — `state: false`:**
        Desactiva el dispositivo. A partir de ese momento:
        1. Las marcaciones entrantes desde este dispositivo son rechazadas por el backend.
        2. Se envía notificación inmediata vía WebSocket + email (Resend) a:
           - El admin con permiso `MANAGE_DEVICES`.
           - El trabajador que intente marcar desde ese dispositivo.

        Invalida caché Redis de devices.
        **Permisos requeridos:** `MANAGE_DEVICES`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchDeviceRequest'
      responses:
        "200":
          description: Dispositivo actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceProfile'
        "403":
          description: Sin permiso `MANAGE_DEVICES`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Dispositivo no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - CoreHR · Devices
      summary: Eliminar un dispositivo
      operationId: deleteDevice
      description: |
        Eliminación física del dispositivo.
        **Solo si no tiene asistencias ni registros biométricos asociados** → `409`.
        Invalida caché Redis de devices.
        **Permisos requeridos:** `MANAGE_DEVICES`
      responses:
        "204":
          description: Dispositivo eliminado.
        "403":
          description: Sin permiso `MANAGE_DEVICES`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Dispositivo no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: El dispositivo tiene asistencias o registros biométricos asociados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ────────────────────────────────────────────────────────────────────
  # BIOMETRIA (Huellas digitales)
  # ────────────────────────────────────────────────────────────────────
  /corehr/biometria:
    get:
      tags:
        - CoreHR · Biometría
      summary: Listar registros biométricos del tenant
      operationId: listBiometria
      description: |
        Devuelve registros biométricos. Filtrable por trabajador o dispositivo.
        **`template_cifrado` y `llave_cifrado` NUNCA se incluyen en la respuesta.**

        **Permisos requeridos:** `MANAGE_BIOMETRICS`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - name: tenant_user_id
          in: query
          required: false
          description: "Filtra huellas de un trabajador específico."
          schema:
            type: integer
        - name: device_id
          in: query
          required: false
          description: "Filtra huellas capturadas en un dispositivo específico."
          schema:
            type: integer
        - name: activo
          in: query
          required: false
          description: "Filtra por estado activo/inactivo."
          schema:
            type: boolean
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        "200":
          description: Lista paginada de registros biométricos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBiometriaListResponse'
        "403":
          description: Sin permiso `MANAGE_BIOMETRICS`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /corehr/biometria/enroll/iniciar:
    post:
      tags:
        - CoreHR · Biometría
      summary: Iniciar sesión de enrolamiento biométrico (Paso 1)
      operationId: initEnroll
      description: |
        **Paso 1 de 2** del enrolamiento biométrico.

        El admin solicita poner el dispositivo en modo enrolamiento para un trabajador.
        El backend:
        1. Valida que el `device_id` esté activo y en la sede del trabajador.
        2. Almacena en Redis la sesión:
           `enroll_session:{device_id}:{tenant_user_id}` → `{finger_index, enroll_token}` (TTL 120s).
        3. Devuelve el `enroll_token` y `expires_at` para que el frontend muestre el countdown.

        El middleware ZKTeco hace polling a Redis cada 2s. Al detectar la clave,
        captura la siguiente huella en modo enrolamiento y llama a
        `POST /corehr/biometria/enroll/completar` con el `enroll_token`.

        **Seguridad:** el `enroll_token` es un UUID v4 aleatorio de un solo uso.
        El TTL de 120s en Redis evita sesiones zombi.

        **Permisos requeridos:** `MANAGE_BIOMETRICS`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitEnrollRequest'
      responses:
        "201":
          description: Sesión de enrolamiento iniciada. El dispositivo está en modo espera.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollSessionResponse'
        "403":
          description: Sin permiso `MANAGE_BIOMETRICS`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: "`tenant_user_id` o `device_id` no encontrado."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Ya existe una sesión de enrolamiento activa para este dispositivo/usuario.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: El dispositivo no está activo (`state = false`) o no pertenece a la sede del trabajador.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /corehr/biometria/enroll/completar:
    post:
      tags:
        - CoreHR · Biometría
      summary: Completar enrolamiento biométrico (Paso 2 — Middleware)
      operationId: completeEnroll
      description: |
        **Paso 2 de 2** del enrolamiento biométrico.
        **Invocado exclusivamente por el middleware ZKTeco**, no por el frontend.

        El middleware envía la huella cifrada. El backend:
        1. Valida el `enroll_token` en Redis (debe existir y no haber expirado).
        2. Valida que `device_code` y `finger_index` coincidan con la sesión.
        3. Crea o actualiza el registro en `usuario_biometria` (`activo = true`).
        4. Elimina la clave de Redis (token de un solo uso).
        5. Notifica al admin vía WebSocket (`/user/{adminId}/queue/biometria`)
           con confirmación de enrolamiento exitoso.

        **Si ya existe un registro biométrico para el mismo `tenant_user_id` y `finger_index`:**
        Se marca el anterior como `activo = false` y se crea el nuevo (historial inmutable).

        **Permisos requeridos:** ninguno (autenticación por `enroll_token` en Redis).
        El endpoint valida el token; no requiere JWT.
      security: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteEnrollRequest'
      responses:
        "201":
          description: Huella enrolada exitosamente. Admin notificado vía WebSocket.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBiometriaProfile'
        "400":
          description: "`enroll_token` expirado o inválido."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: "`finger_index` o `device_code` no coinciden con la sesión registrada."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /corehr/biometria/{id}:
    parameters:
      - $ref: '#/components/parameters/BiometriaId'
      - $ref: '#/components/parameters/TenantIdHeader'

    patch:
      tags:
        - CoreHR · Biometría
      summary: Activar o desactivar un registro biométrico
      operationId: patchBiometria
      description: |
        Solo permite cambiar el campo `activo`.
        Útil para desactivar manualmente una huella sin eliminarla.
        Al dar de baja un `tenant_user` (soft-delete), el backend desactiva
        automáticamente todos sus registros biométricos (`activo = false`).
        **Permisos requeridos:** `MANAGE_BIOMETRICS`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - activo
              properties:
                activo:
                  type: boolean
                  example: false
      responses:
        "200":
          description: Registro biométrico actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBiometriaProfile'
        "403":
          description: Sin permiso `MANAGE_BIOMETRICS`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Registro biométrico no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ────────────────────────────────────────────────────────────────────
  # ATTENDANCE (Asistencia)
  # ────────────────────────────────────────────────────────────────────
  /corehr/attendance:
    get:
      tags:
        - CoreHR · Attendance
      summary: Listar registros de asistencia
      operationId: listAttendance
      description: |
        Devuelve registros de asistencia del tenant con scope por permisos.

        | Permiso                | Scope por defecto       | Puede ampliar scope |
        |------------------------|------------------------|---------------------|
        | `VIEW_ALL_ATTENDANCE`  | Todo el tenant          | No aplica           |
        | `VIEW_ATTENDANCE`      | Sus asignaciones        | Sí, via `scope`     |
        | `VIEW_OWN_ATTENDANCE`  | Solo el propio (`SELF`) | No                  |
        | Ninguno                | `403 Forbidden`         | —                   |

        **Filtros de rango de fechas recomendados:**
        siempre usar `date_from` y `date_to` para evitar consultas sin límite temporal.
        El backend impone un máximo de 31 días por consulta si no se especifica rango.

        **Caché Redis:** resultados de asistencia por día y tenant cacheados
        (`attendance:{tenant_id}:{date}`, TTL hasta fin del día).
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IncidentScopeParam'
        - $ref: '#/components/parameters/BranchIdParam'
        - $ref: '#/components/parameters/AreaIdParam'
        - $ref: '#/components/parameters/DepartamentoIdParam'
        - $ref: '#/components/parameters/AttendanceDateFromParam'
        - $ref: '#/components/parameters/AttendanceDateToParam'
        - $ref: '#/components/parameters/AttendanceStateParam'
        - name: tenant_user_id
          in: query
          required: false
          description: "Filtra asistencias de un trabajador específico."
          schema:
            type: integer
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        "200":
          description: Lista paginada de asistencias con scope resuelto.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceListResponse'
        "400":
          description: Rango de fechas supera 31 días o formato inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Sin permisos de visualización de asistencia.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /corehr/attendance/{id}:
    parameters:
      - $ref: '#/components/parameters/AttendanceId'
      - $ref: '#/components/parameters/TenantIdHeader'

    get:
      tags:
        - CoreHR · Attendance
      summary: Obtener un registro de asistencia por ID
      operationId: getAttendanceById
      description: |
        Devuelve el registro de asistencia completo.
        Aplican las mismas reglas de scope que en el listado.
        **Permisos requeridos:** `VIEW_ATTENDANCE` | `VIEW_ALL_ATTENDANCE` | `VIEW_OWN_ATTENDANCE` (solo propio)
      responses:
        "200":
          description: Registro de asistencia encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceProfile'
        "403":
          description: El registro no pertenece al scope del solicitante.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Registro no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags:
        - CoreHR · Attendance
      summary: Corregir un registro de asistencia (admin)
      operationId: patchAttendance
      description: |
        Corrección manual de un registro de asistencia por un administrador.
        Genera registro en `Auditoria_sistema` tipo `UPDATE` con:
        - `valor_anterior`: estado anterior del registro.
        - `valor_nuevo`: estado corregido.
        - `modificado_por`: ID del admin que realizó la corrección.

        **No confundir con la solicitud de revisión del trabajador:**
        esa solicitud se gestiona como una incidencia dentro del módulo `/incidentes`.

        **Permisos requeridos:** `EDIT_ATTENDANCE`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchAttendanceRequest'
            examples:
              corregir_checkin:
                summary: Corregir hora de entrada
                value:
                  check_in: "2026-06-25T07:05:00Z"
                  state: "PUNTUAL"
                  minutes_late: 0
              registrar_falta_justificada:
                summary: Cambiar FALTA a estado corregido
                value:
                  state: "PUNTUAL"
                  minutes_late: 0
      responses:
        "200":
          description: Registro corregido. Retorna el estado actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceProfile'
        "403":
          description: Sin permiso `EDIT_ATTENDANCE`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Registro no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: "`check_out` no puede ser anterior a `check_in`."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ────────────────────────────────────────────────────────────────────
  # NON WORKING DAYS (Días no laborables)
  # ────────────────────────────────────────────────────────────────────
  /corehr/non-working-days:
    get:
      tags:
        - CoreHR · Non-Working Days
      summary: Listar días no laborables del tenant
      operationId: listNonWorkingDays
      description: |
        Devuelve los días no laborables definidos por el tenant.
        Los días con `is_recurring = true` aplican anualmente;
        el backend los resuelve para el año consultado si se usa `date_from`/`date_to`.
        Cacheado en Redis (`non_working_days:{tenant_id}`, TTL 1 hora).
        **Permisos requeridos:** `MANAGE_NON_WORKING_DAYS`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/AttendanceDateFromParam'
        - $ref: '#/components/parameters/AttendanceDateToParam'
        - name: is_recurring
          in: query
          required: false
          schema:
            type: boolean
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        "200":
          description: Lista paginada de días no laborables.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NonWorkingDayListResponse'
        "403":
          description: Sin permiso `MANAGE_NON_WORKING_DAYS`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - CoreHR · Non-Working Days
      summary: Crear un día no laborable
      operationId: createNonWorkingDay
      description: |
        Registra un día no laborable para el tenant.
        Si `is_recurring = true`, el backend lo aplica anualmente sin crear registros nuevos.
        Invalida caché Redis de non_working_days.
        **Permisos requeridos:** `MANAGE_NON_WORKING_DAYS`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNonWorkingDayRequest'
      responses:
        "201":
          description: Día no laborable creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NonWorkingDayProfile'
        "403":
          description: Sin permiso `MANAGE_NON_WORKING_DAYS`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Ya existe un registro para esa fecha en el tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /corehr/non-working-days/{id}:
    parameters:
      - $ref: '#/components/parameters/NonWorkingDayId'
      - $ref: '#/components/parameters/TenantIdHeader'

    patch:
      tags:
        - CoreHR · Non-Working Days
      summary: Actualizar un día no laborable
      operationId: patchNonWorkingDay
      description: |
        Actualiza descripción, fecha o recurrencia.
        Invalida caché Redis de non_working_days.
        **Permisos requeridos:** `MANAGE_NON_WORKING_DAYS`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchNonWorkingDayRequest'
      responses:
        "200":
          description: Día no laborable actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NonWorkingDayProfile'
        "404":
          description: Registro no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - CoreHR · Non-Working Days
      summary: Eliminar un día no laborable
      operationId: deleteNonWorkingDay
      description: |
        Eliminación física del registro. Invalida caché Redis.
        **Permisos requeridos:** `MANAGE_NON_WORKING_DAYS`
      responses:
        "204":
          description: Registro eliminado.
        "403":
          description: Sin permiso `MANAGE_NON_WORKING_DAYS`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Registro no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ────────────────────────────────────────────────────────────────────
  # TENANT CONTACTS
  # ────────────────────────────────────────────────────────────────────
  /corehr/tenant-contacts:
    get:
      tags:
        - CoreHR · Tenant Contacts
      summary: Listar contactos del tenant
      operationId: listTenantContacts
      description: |
        Devuelve los TenantUsers designados como contactos del tenant.
        Incluye datos personales heredados del TenantUser.
        **Permisos requeridos:** `VIEW_ALL_TENANT_USERS`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - name: type
          in: query
          required: false
          description: "Filtra por tipo de contacto (ej. RRHH, Soporte Técnico)."
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        "200":
          description: Lista paginada de contactos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantContactListResponse'
        "403":
          description: Sin permiso `VIEW_ALL_TENANT_USERS`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - CoreHR · Tenant Contacts
      summary: Designar un TenantUser como contacto del tenant
      operationId: createTenantContact
      description: |
        Designa a un TenantUser activo como contacto del tenant para un tipo específico.
        Un usuario puede ser contacto de múltiples tipos (múltiples registros).
        **Permisos requeridos:** `EDIT_USER`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantContactRequest'
      responses:
        "201":
          description: Contacto designado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantContactProfile'
        "403":
          description: Sin permiso `EDIT_USER`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: "`tenant_user_id` no encontrado o no está `ACTIVO`."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: El usuario ya es contacto del tipo indicado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /corehr/tenant-contacts/{id}:
    parameters:
      - $ref: '#/components/parameters/TenantContactId'
      - $ref: '#/components/parameters/TenantIdHeader'

    patch:
      tags:
        - CoreHR · Tenant Contacts
      summary: Actualizar tipo de un contacto del tenant
      operationId: patchTenantContact
      description: |
        Actualiza el tipo de contacto.
        **Permisos requeridos:** `EDIT_USER`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchTenantContactRequest'
      responses:
        "200":
          description: Contacto actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantContactProfile'
        "404":
          description: Contacto no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - CoreHR · Tenant Contacts
      summary: Eliminar (soft-delete) un contacto del tenant
      operationId: deleteTenantContact
      description: |
        Soft-delete: establece `deleted_at` en el registro.
        El TenantUser referenciado no se ve afectado.
        **Permisos requeridos:** `EDIT_USER`
      responses:
        "204":
          description: Contacto eliminado (soft-delete).
        "403":
          description: Sin permiso `EDIT_USER`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Contacto no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ────────────────────────────────────────────────────────────────────
  # TENANT USER DEPARTMENTS (Historial de departamentos)
  # ────────────────────────────────────────────────────────────────────
  /corehr/usuarios/{id}/departamentos:
    parameters:
      - $ref: '#/components/parameters/UsuarioId'
      - $ref: '#/components/parameters/TenantIdHeader'

    get:
      tags:
        - CoreHR · Departamentos de Usuario
      summary: Listar historial de departamentos de un trabajador
      operationId: listTenantUserDepartments
      description: |
        Devuelve el historial completo de asignaciones de departamento de un trabajador.
        Incluye asignaciones activas (`end_date = null`) e históricas.
        Útil para filtrar trabajadores por departamento en el módulo de usuarios.
        **Permisos requeridos:** `VIEW_USUARIOS` | `VIEW_ALL_TENANT_USERS`
      parameters:
        - name: activa
          in: query
          required: false
          description: "Si `true`, devuelve solo la asignación activa (`end_date = null`)."
          schema:
            type: boolean
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        "200":
          description: Historial de departamentos del trabajador.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUserDepartmentListResponse'
        "403":
          description: Sin permiso de visualización.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Trabajador no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - CoreHR · Departamentos de Usuario
      summary: Asignar un departamento a un trabajador
      operationId: createTenantUserDepartment
      description: |
        Registra una nueva asignación de departamento para el trabajador.

        **Regla de departamento primario:**
        Si `is_primary = true` y el trabajador ya tiene un departamento primario activo,
        el backend cierra automáticamente el anterior (`end_date = start_date - 1 día`).

        Al crear la primera asignación de departamento para un trabajador,
        no se dispara notificación (la notificación de trabajador sin schedule
        es independiente y ocurre al crear el TenantUser).

        **Permisos requeridos:** `MANAGE_DEPARTMENTS`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantUserDepartmentRequest'
      responses:
        "201":
          description: Asignación de departamento creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUserDepartmentProfile'
        "403":
          description: Sin permiso `MANAGE_DEPARTMENTS`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Trabajador o departamento no encontrado en el tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: "`end_date` no puede ser anterior a `start_date`."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /corehr/usuarios/{id}/departamentos/{departamentoId}:
    parameters:
      - $ref: '#/components/parameters/UsuarioId'
      - name: departamentoId
        in: path
        required: true
        description: ID del registro de asignación de departamento.
        schema:
          type: integer
      - $ref: '#/components/parameters/TenantIdHeader'

    patch:
      tags:
        - CoreHR · Departamentos de Usuario
      summary: Actualizar una asignación de departamento
      operationId: patchTenantUserDepartment
      description: |
        Caso más común: cerrar la asignación activa estableciendo `end_date`.
        También permite cambiar `is_primary`.
        **Permisos requeridos:** `MANAGE_DEPARTMENTS`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchTenantUserDepartmentRequest'
      responses:
        "200":
          description: Asignación actualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUserDepartmentProfile'
        "403":
          description: Sin permiso `MANAGE_DEPARTMENTS`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Asignación no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: "`end_date` no puede ser anterior a `start_date`."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ────────────────────────────────────────────────────────────────────
  # WEBSOCKET COREHR
  # ────────────────────────────────────────────────────────────────────
  /ws/corehr:
    get:
      tags:
        - WebSocket (CoreHR)
      summary: Información de conexión WebSocket para módulo coreHR
      description: |
        Endpoint informativo que describe la configuración WebSocket para coreHR.

        ## Configuración STOMP

        **Endpoint de conexión:** `/ws/corehr`
        **Protocolo:** STOMP sobre WebSocket (SockJS como fallback)

        **Autenticación:**
        ```
        Authorization: Bearer <JWT>
        X-Tenant-ID: <tenant-uuid>
        ```

        ## Canales de suscripción coreHR

        | Canal | Receptor | Evento |
        |-------|----------|--------|
        | `/user/{userId}/queue/biometria` | Admin con `MANAGE_BIOMETRICS` | Confirmación/error de enrolamiento. `{userId}` = `tenant_user_id`; el STOMP Principal interno es `{tenantUuid}:{userId}`. |
        | `/user/{userId}/queue/devices` | Admin con `MANAGE_DEVICES` + Trabajador | Dispositivo desactivado al intentar marcar. `{userId}` = `tenant_user_id`; el STOMP Principal interno es `{tenantUuid}:{userId}`. |
        | `/topic/tenant/{tenantId}/attendance` | Admin con `VIEW_ALL_ATTENDANCE` | Nuevas asistencias en tiempo real (fin de turno) |
        | `/user/{userId}/queue/schedule` | Admin con `MANAGE_USER_SHIFTS` | Trabajador sin schedule asignado al crear usuario. `{userId}` = `tenant_user_id`; el STOMP Principal interno es `{tenantUuid}:{userId}`. |

        ## Payloads de eventos

        **Enrolamiento biométrico completado:**
        ```json
        {
          "tipo": "ENROLL_COMPLETADO",
          "tenant_user_id": 42,
          "finger_index": 1,
          "device_code": "ZK-C2PRO-00123",
          "timestamp": "2026-06-25T10:30:00Z"
        }
        ```

        **Dispositivo inactivo al intentar marcar:**
        ```json
        {
          "tipo": "DEVICE_INACTIVO",
          "device_id": 1,
          "device_code": "ZK-C2PRO-00123",
          "tenant_user_id": 42,
          "timestamp": "2026-06-25T07:05:00Z",
          "mensaje": "El dispositivo ZK-C2PRO-00123 está inactivo. Contacte al administrador."
        }
        ```

        **Trabajador sin schedule (al crear usuario):**
        ```json
        {
          "tipo": "USUARIO_SIN_SCHEDULE",
          "tenant_user_id": 55,
          "nombre_completo": "Ana Torres Quispe",
          "timestamp": "2026-06-25T09:00:00Z",
          "mensaje": "El trabajador Ana Torres Quispe no tiene un schedule asignado."
        }
        ```

        ## Aislamiento multi-tenant
        - El JWT con `tenant_id` se valida al conectar al WebSocket;
          el `sub` del JWT se combina como `{tenantUuid}:{sub}` para el
          `Principal.getName()` de STOMP, garantizando unicidad global.
        - Los topics `/topic/tenant/{tenantId}/` incluyen el `tenant_id`,
          imposibilitando escucha cruzada entre tenants.
        - Los canales `/user/{userId}/queue/` — aunque el path muestre
          el `tenant_user_id` numérico — enrutan exclusivamente al
          Principal compuesto `{tenantUuid}:{userId}`.
      responses:
        "200":
          description: Información de configuración WebSocket coreHR.
          content:
            application/json:
              schema:
                type: object
                properties:
                  endpoint:
                    type: string
                    example: "/ws/corehr"
                  protocol:
                    type: string
                    example: "STOMP"
                  channels:
                    type: array
                    items:
                      type: object
                      properties:
                        channel:
                          type: string
                        receptor:
                          type: string
                        evento:
                          type: string
