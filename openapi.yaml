    # ─── Request bodies para actualización ───────────────────────────────
    ActualizarUsuarioRequest:
      type: object
      required:
        - document_type
        - document_value
        - name
        - father_surname
        - mother_surname
        - email
        - phone
        - role_ids
      description: |
        **Actualización completa (PUT).**
        Todos los campos son requeridos. Reemplaza completamente el recurso.
        La contraseña NO se actualiza por este endpoint;
        usar `PATCH /usuarios/{id}/password` para ese caso.
      properties:
        document_type:
          type: string
          enum: [DNI, CE, PASAPORTE]
          example: "DNI"
        document_value:
          type: string
          example: "76543210"
        name:
          type: string
          example: "Carlos"
        father_surname:
          type: string
          example: "Mendoza"
        mother_surname:
          type: string
          example: "González"
        email:
          type: string
          format: email
          example: "carlos.mendoza@colegio.edu.pe"
        phone:
          type: string
          nullable: true
          example: "+51987654321"
        img_url:
          type: string
          format: uri
          nullable: true
          example: "https://r2.trazzo.pe/profiles/76543210.jpg"
        role_ids:
          type: array
          items:
            type: integer
          description: "Lista completa de IDs de roles. Reemplaza los roles anteriores."
          example: [2]
        sede_ids:
          type: array
          items:
            type: integer
          description: "Lista completa de IDs de sedes asignadas."
          example: [1, 2]
        area_ids:
          type: array
          items:
            type: integer
          description: "Lista completa de IDs de áreas asignadas."
          example: [3, 7]
        departamento_ids:
          type: array
          items:
            type: integer
          description: "Lista completa de IDs de departamentos asignados."
          example: [1, 2]

    PatchUsuarioRequest:
      type: object
      description: |
        **Actualización parcial (PATCH).**
        Solo se envían los campos a modificar. Los campos omitidos conservan su valor actual.
        Los arrays (`role_ids`, `sede_ids`, `area_ids`) cuando se incluyen **reemplazan** la colección completa.
      minProperties: 1
      properties:
        name:
          type: string
          example: "Carlos Alberto"
        father_surname:
          type: string
          example: "Mendoza"
        mother_surname:
          type: string
          example: "González"
        email:
          type: string
          format: email
          example: "carlos.mendoza@colegio.edu.pe"
        phone:
          type: string
          nullable: true
          example: "+51987654321"
        img_url:
          type: string
          format: uri
          nullable: true
        status:
          type: string
          enum: [ACTIVO, SUSPENDIDO, INACTIVO]
          description: "Cambio de estado del usuario. INACTIVO equivale a soft-delete funcional (suspensión operativa, no elimina el registro)."
          example: "SUSPENDIDO"
        role_ids:
          type: array
          items:
            type: integer
          description: "Reemplaza los roles actuales del usuario."
          example: [3]
        sede_ids:
          type: array
          items:
            type: integer
          description: "Reemplaza las sedes asignadas."
        area_ids:
          type: array
          items:
            type: integer
          description: "Reemplaza las áreas asignadas."
        departamento_ids:
          type: array
          items:
            type: integer
          description: "Reemplaza los departamentos asignados."

    SoftDeleteResponse:
      type: object
      description: "Respuesta de confirmación tras el soft-delete."
      properties:
        id:
          type: integer
          example: 42
        status:
          type: string
          example: "INACTIVO"
        deleted_at:
          type: string
          format: date-time
          description: "Timestamp del momento en que se aplicó la baja lógica."
        deleted_by:
          type: integer
          description: "ID del usuario que ejecutó la baja."
          example: 1

    
    # ==========================================
