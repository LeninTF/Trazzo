        Actualiza `minutes`, `name`, `description` o `activo` de una tolerancia.
        `type` no es modificable.
        **Permisos requeridos:** `MANAGE_SCHEDULES`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchToleranciaRequest'
      responses:
        "200":
          description: Tolerancia actualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToleranciaProfile'
        "403":
          description: Sin permiso `MANAGE_SCHEDULES`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Tolerancia o schedule no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - CoreHR · Tolerancias
