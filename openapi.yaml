        usuarios con MasterRole y permiso `CREATE_MASTER_USER`.
        Mismo workflow de contraseña temporal que el endpoint de tenant.
        **No requiere ni acepta `X-Tenant-ID`.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearMasterUsuarioRequest'
