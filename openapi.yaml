  # ----------------------------------------
  # MÓDULO: SEGURIDAD CRIPTOGRÁFICA (MIDDLEWARE SUPPORT)
  # ----------------------------------------
  /security/public-key:
    get:
      tags:
        - Seguridad Criptográfica
      summary: Obtener llave pública RSA del servidor
      description: >
        Expone la llave pública RSA-2048 en PEM para que el Middleware C# encripte
        las huellas. Respaldado por Redis (TTL planeado).

        **Rate limiting:** aplica Bucket4j token-bucket (por IP, renovación cada 60 s).
        Headers de respuesta: `X-RateLimit-Limit`, `X-RateLimit-Remaining`,
        `X-RateLimit-Reset`.

        **Caché HTTP:** la respuesta incluye `Cache-Control: public, max-age=300`
        y `ETag` basado en `kid`. Clientes deben respetar el `ETag` y responder con
        `If-None-Match` para recibir `304 Not Modified`.
      security: []
      responses:
        "200":
          description: Llave pública entregada.
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=300
              description: Directiva de caché pública por 5 minutos.
            ETag:
              schema:
                type: string
                example: '"pubkey-abc123"'
              description: Hash del contenido basado en `kid`. Usar en `If-None-Match`.
            X-RateLimit-Limit:
              schema:
                type: integer
              description: Máximo de requests permitidos en la ventana.
            X-RateLimit-Remaining:
              schema:
                type: integer
              description: Requests restantes en la ventana actual.
            X-RateLimit-Reset:
              schema:
                type: integer
                format: int64
              description: Timestamp Unix (segundos) del fin de la ventana.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicKeyResponse"
        "304":
          description: >
            No modificado. Servidor responde vacío cuando el cliente envió
            `If-None-Match` con un `ETag` vigente.
        "429":
          description: Demasiadas solicitudes. Rate limit excedido.
          headers:
            Retry-After:
              schema:
                type: integer
              description: Segundos a esperar antes de reintentar.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: too_many_requests
                  message:
                    type: string
                    example: Rate limit exceeded. Try again in 30 seconds.
                  retryAfterSeconds:
                    type: integer
                    example: 30

  # ----------------------------------------
  # MÓDULO: CONTROL DE ASISTENCIA
  # ----------------------------------------
  /asistencia/marcar:
    post:
      tags:
        - Asistencia Biométrica
      summary: Registrar marcación síncrona ordinaria
      description: |
        Procesa una única huella digital descifrando la carga útil y ejecutando emparejamiento con SourceAFIS.

        **⚠️ v3.0.0 — Breaking change:** el middleware debe identificar el dispositivo
        por `device_code` (campo `code` de la tabla `device`, serial ZKTeco) y enviar
        el `tenant_user_id` del trabajador. El backend resuelve el `schedule` activo
        del trabajador y calcula `minutes_late` comparando `check_in` contra
        `entry_time` del schedule menos los `minutes` de la `tolerancia` de tipo `ENTRADA`.

        Si el dispositivo tiene `state = false`, la marcación es rechazada y se envía
        notificación WebSocket + email (Resend) al trabajador y al admin con `MANAGE_DEVICES`.
      parameters:
        - name: X-Tenant-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarcacionRequest"
      responses:
        "200":
          description: Marcación procesada correctamente (Entrada/Salida registrada).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceProfile"
        "403":
          description: Conflicto de incongruencia de Tenant.

  /asistencia/sync:
    post:
      tags:
        - Asistencia Biométrica
      summary: Sincronizar lote de marcaciones almacenadas offline
      description: Recibe arrays de huellas encoladas en IndexedDB durante la caída del internet de la sede.
      parameters:
        - name: X-Tenant-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarcacionSyncRequest"
      responses:
        "202":
          description: Lote aceptado para procesamiento asíncrono en segundo plano.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ----------------------------------------
  # MÓDULO: INCIDENCIAS
  # Contexto: tenant_{slug}_db · Requiere X-Tenant-ID
  # ----------------------------------------

  # ── Incident Types ─────────────────────────────────────────────────────
  /incidentes/tipos:
    get:
      tags:
        - Incidencias (Tipos)
      summary: Listar tipos de incidencia del tenant
      operationId: listarIncidentTypes
      description: |
        Devuelve lista paginada de tipos de incidencia.

        **Redis:** la lista de tipos activos se cachea en Redis (TTL: 1 hora)
        para reducir carga en la base de datos.

        **Permisos requeridos:** `VIEW_OWN_INCIDENTS` (para consulta básica),
        `MANAGE_INCIDENT_TYPES` (para ver tipos inactivos).
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - name: activo
          in: query
          required: false
          description: "Filtra por estado activo/inactivo. Si se omite, muestra solo activos."
          schema:
            type: boolean
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        "200":
          description: Lista paginada de tipos de incidencia.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentTypeListResponse'
        "403":
          description: Sin permiso suficiente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Incidencias (Tipos)
      summary: Crear un nuevo tipo de incidencia
      operationId: createIncidentType
      description: |
        Crea un nuevo tipo de incidencia. Se crea con `activo = true`.

        **Validaciones:**
        - El `nombre` debe ser único dentro del tenant.
        - Longitud máxima: 100 caracteres.

        **Permisos requeridos:** `MANAGE_INCIDENT_TYPES`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIncidentTypeRequest'
      responses:
        "201":
          description: Tipo de incidencia creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentTypeProfile'
        "400":
          description: Nombre inválido o duplicado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Sin permiso `MANAGE_INCIDENT_TYPES`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /incidentes/tipos/{id}:
    parameters:
      - $ref: '#/components/parameters/IncidentTypeId'
      - $ref: '#/components/parameters/TenantIdHeader'

    get:
      tags:
        - Incidencias (Tipos)
      summary: Obtener un tipo de incidencia por ID
      operationId: getIncidentTypeById
      description: |
        Devuelve los detalles de un tipo de incidencia.

        **Redis:** si el tipo está activo, se sirve desde caché cuando esté disponible.

        **Permisos requeridos:** `VIEW_OWN_INCIDENTS` o `MANAGE_INCIDENT_TYPES`
      responses:
        "200":
          description: Tipo de incidencia.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentTypeProfile'
        "404":
          description: Tipo de incidencia no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags:
        - Incidencias (Tipos)
      summary: Actualizar parcialmente un tipo de incidencia
      operationId: patchIncidentType
      description: |
        Actualiza los campos enviados de un tipo de incidencia.

        **Casos de uso:**
        - `{ "activo": false }`: desactiva el tipo. Las incidencias históricas
          siguen visibles, pero no se pueden crear nuevas con este tipo.
        - `{ "activo": true }`: reactiva un tipo desactivado.
        - `{ "nombre": "Nuevo Nombre" }`: renombra el tipo (debe ser único).

        **Permisos requeridos:** `MANAGE_INCIDENT_TYPES`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchIncidentTypeRequest'
      responses:
        "200":
          description: Tipo de incidencia actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentTypeProfile'
        "400":
          description: Nombre duplicado o inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Sin permiso `MANAGE_INCIDENT_TYPES`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Tipo de incidencia no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Incidents ──────────────────────────────────────────────────────────
  /incidentes:
    get:
      tags:
        - Incidencias
      summary: Listar incidencias con visibilidad basada en permisos
      operationId: listarIncidencias
      description: |
        Devuelve lista paginada de incidencias. El **scope** se resuelve
        automáticamente según los permisos del JWT:

        | Permiso del solicitante              | Scope por defecto  |
        |--------------------------------------|--------------------|
        | `VIEW_ALL_INCIDENTS`                 | Todo el tenant     |
        | `VIEW_AREA_INCIDENTS` (sin VIEW_ALL) | Solo sus asignaciones (`MY_ASSIGNMENTS`) |
        | `VIEW_OWN_INCIDENTS`                 | Solo sus propias incidencias (`SELF`) |
        | Ninguno de los anteriores            | `403 Forbidden`    |

        **Redis:** los conteos de incidencias por estado se cachean en
        Redis (TTL: 5 minutos) para el dashboard del supervisor.

        **Permisos requeridos:** `VIEW_OWN_INCIDENTS`, `VIEW_AREA_INCIDENTS`
        o `VIEW_ALL_INCIDENTS`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IncidentScopeParam'
        - $ref: '#/components/parameters/IncidentSedeIdParam'
        - $ref: '#/components/parameters/IncidentAreaIdParam'
        - $ref: '#/components/parameters/IncidentDepartamentoIdParam'
        - $ref: '#/components/parameters/IncidentStateParam'
        - $ref: '#/components/parameters/IncidentTypeFilterParam'
        - $ref: '#/components/parameters/DateFromParam'
        - $ref: '#/components/parameters/DateToParam'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        "200":
          description: Lista paginada de incidencias según el scope resuelto.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentListResponse'
        "403":
          description: Sin permiso suficiente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Incidencias
      summary: Crear una nueva incidencia
      operationId: createIncidente
      description: |
        Crea una nueva incidencia en estado `PENDIENTE`.

        **Origen de creación:**
        - **Manual (trabajador):** omite `tenant_user_id`. El backend usa
          el `sub` del JWT. Requiere permiso `CREATE_INCIDENT`.
        - **Automática (sistema):** envía `tenant_user_id` del trabajador
          afectado. Requiere un rol de sistema (sin validación de `CREATE_INCIDENT`).

        **Redis:** el `comment` se cachea en Redis para acceso rápido
        en el dashboard de incidencias.

        **Permisos requeridos:** `CREATE_INCIDENT` (para creación manual)
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIncidentRequest'
      responses:
        "201":
          description: Incidencia creada en estado PENDIENTE.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentProfile'
        "400":
          description: Datos inválidos o tipo de incidencia inactivo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Sin permiso `CREATE_INCIDENT`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /incidentes/{id}:
    parameters:
      - $ref: '#/components/parameters/IncidentId'
      - $ref: '#/components/parameters/TenantIdHeader'

    get:
      tags:
        - Incidencias
      summary: Obtener una incidencia por ID
      operationId: getIncidenteById
      description: |
        Devuelve el detalle completo de una incidencia, incluyendo:
        - Tipo de incidencia.
        - Datos básicos del trabajador afectado.
        - Evidencias asociadas.
        - Permiso generado (si aplica).

        **Regla de visibilidad:** aplica las mismas reglas que `GET /incidentes`.
        El trabajador siempre puede ver sus propias incidencias (`VIEW_OWN_INCIDENTS`).

        **Permisos requeridos:** `VIEW_OWN_INCIDENTS`, `VIEW_AREA_INCIDENTS`
        o `VIEW_ALL_INCIDENTS`
      responses:
        "200":
          description: Detalle completo de la incidencia.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentProfile'
        "403":
          description: La incidencia no está dentro del scope del solicitante.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Incidencia no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags:
        - Incidencias
      summary: Editar comentario de una incidencia (solo PENDIENTE)
      operationId: patchIncidente
      description: |
        Actualiza el campo `comment` de una incidencia.

        **Reglas:**
        - Solo mientras la incidencia está `PENDIENTE`.
        - Solo el trabajador afectado puede editarla.
        - Únicamente se modifica `comment`.

        **Redis:** el `comment` se actualiza en Redis al modificarse.

        **Permisos requeridos:** El trabajador es el propietario de la incidencia
        (se valida contra el `sub` del JWT). No requiere permiso adicional.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchIncidentRequest'
      responses:
        "200":
          description: Incidencia actualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentProfile'
        "400":
          description: Incidencia no está en estado PENDIENTE.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: No eres el propietario de esta incidencia.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Incidencia no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Incident State ─────────────────────────────────────────────────────
  /incidentes/{id}/estado:
    parameters:
      - $ref: '#/components/parameters/IncidentId'
      - $ref: '#/components/parameters/TenantIdHeader'

    patch:
      tags:
        - Incidencias
      summary: Cambiar estado de una incidencia (APROBAR / DENEGAR)
      operationId: changeIncidentState
      description: |
        Cambia el estado de una incidencia de `PENDIENTE` a `APROBADO` o `DENEGADO`.

        **Flujo al aprobar:**
        1. Valida que el estado actual sea `PENDIENTE`.
        2. Si `days_granted` está presente, crea registro en `incidents_permission`.
        3. Cambia el estado a `APROBADO`.
        4. Dispara evento asíncrono `POST /incidentes/{id}/justificar` para
           marcar los días como justificados en asistencia.
        5. Notifica al trabajador vía WebSocket y email (Resend).

        **Flujo al denegar:**
        1. Valida que el estado actual sea `PENDIENTE`.
        2. `motivo_rechazo` es requerido.
        3. Cambia el estado a `DENEGADO`.
        4. Notifica al trabajador vía WebSocket y email (Resend).

        **Permisos requeridos:** `APPROVE_INCIDENT`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentStateChangeRequest'
      responses:
        "200":
          description: Estado actualizado. Notificación enviada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentProfile'
        "400":
          description: |
            - Estado actual no es `PENDIENTE`.
            - `motivo_rechazo` ausente al denegar.
            - `days_granted` inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Sin permiso `APPROVE_INCIDENT`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Incidencia no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Evidence ───────────────────────────────────────────────────────────
  /incidentes/{id}/evidencias:
    parameters:
      - $ref: '#/components/parameters/IncidentId'
      - $ref: '#/components/parameters/TenantIdHeader'

    post:
      tags:
        - Incidencias (Evidencias)
      summary: Registrar evidencia para una incidencia
      operationId: createEvidence
      description: |
        Registra una evidencia (archivo subido a Cloudflare R2) para una incidencia.

        **Flujo desde el frontend:**
        1. El frontend verifica que el archivo no exceda 15MB.
        2. El frontend sube el archivo directamente a Cloudflare R2.
        3. Cloudflare R2 devuelve la URL pública.
        4. El frontend envía esta solicitud con la URL y metadatos.

        **Restricciones:**
        - Solo una evidencia por incidencia.
        - Solo mientras la incidencia está `PENDIENTE`.
        - Formatos permitidos: PDF, Word, imágenes, videos.

        **Permisos requeridos:** `CREATE_INCIDENT` (para su propia incidencia)
        o el sistema en creación automática.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvidenceRequest'
      responses:
        "201":
          description: Evidencia registrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentEvidenceProfile'
        "400":
          description: |
            - Ya existe una evidencia para esta incidencia.
            - Incidencia no está en `PENDIENTE`.
            - Tamaño excede 15MB.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: No eres el propietario de esta incidencia.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Incidencia no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Incidencias (Evidencias)
      summary: Listar evidencias de una incidencia
      operationId: listEvidence
      description: |
        Devuelve 0 o 1 evidencias asociadas a una incidencia.

        **Visibilidad:**
        - El trabajador afectado puede ver sus propias evidencias.
        - Los administradores con permiso `VIEW_EVIDENCE` pueden ver
          evidencias de incidencias dentro de su scope.

        **Permisos requeridos:** `VIEW_EVIDENCE` o ser el propietario
        de la incidencia.
      responses:
        "200":
          description: Evidencias asociadas a la incidencia (0..1).
          content:
            application/json:
              schema:
                type: array
                maxItems: 1
                items:
                  $ref: '#/components/schemas/IncidentEvidenceProfile'
        "403":
          description: Sin permiso `VIEW_EVIDENCE`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Incidencia no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /incidentes/{id}/evidencias/{evidenceId}:
    parameters:
      - $ref: '#/components/parameters/IncidentId'
      - $ref: '#/components/parameters/IncidentEvidenceId'
      - $ref: '#/components/parameters/TenantIdHeader'

    delete:
      tags:
        - Incidencias (Evidencias)
      summary: Eliminar una evidencia
      operationId: deleteEvidence
      description: |
        Elimina una evidencia de una incidencia.

        **Reglas:**
        - Solo el trabajador que subió la evidencia puede eliminarla.
        - Solo dentro de los 15 minutos posteriores a la subida.
        - Una vez que la incidencia pasa a `APROBADO` o `DENEGADO`,
          no se puede eliminar manualmente.
        - La eliminación es lógica (se marca como eliminada en BD).
        El archivo en Cloudflare R2 no se elimina.

        **Permisos requeridos:** `DELETE_EVIDENCE`
      responses:
        "204":
          description: Evidencia eliminada. Sin cuerpo de respuesta.
        "403":
          description: |
            - Ventana de 15 minutos expirada.
            - Incidencia ya no está `PENDIENTE`.
            - No eres el propietario de la evidencia.
            - Sin permiso `DELETE_EVIDENCE`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Evidencia o incidencia no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Notifications ──────────────────────────────────────────────────────
  /incidentes/{id}/notificar:
    parameters:
      - $ref: '#/components/parameters/IncidentId'
      - $ref: '#/components/parameters/TenantIdHeader'

    post:
      tags:
        - Incidencias (Notificaciones)
      summary: Enviar notificación de cambio de estado
      operationId: notifyIncident
      description: |
        Dispara una notificación al trabajador afectado informando el
        cambio de estado de su incidencia.

        **Vías de notificación:**
        - **Email:** envía correo vía Resend con los detalles del cambio.
        - **Sistema:** envía notificación en tiempo real vía WebSocket
          al canal específico del usuario.

        **WebSocket — Topología de canales:**
        ```
        STOMP endpoint: /ws/incidents
        Canal usuario:   /user/{userId}/queue/incidents
        ```
        El aislamiento por tenant se logra mediante el **composite
        principal** del STOMP `/{tenantUuid}:{sub}`, donde el broker
        enruta por el `Principal.getName()` del JWT, no por el
        `tenant_user_id` numérico. Esto elimina colisiones cross-tenant
        aunque dos tenants tengan el mismo `tenant_user_id`.

        **Payload del mensaje WebSocket:**
        ```json
        {
          "tipo": "INCIDENCIA_ESTADO",
          "incidencia_id": 42,
          "estado_anterior": "PENDIENTE",
          "estado_nuevo": "APROBADO",
          "timestamp": "2026-06-23T15:30:00Z",
          "mensaje": "Tu incidencia ha sido aprobada."
        }
        ```

        **Permisos requeridos:** `APPROVE_INCIDENT`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotifyIncidentRequest'
      responses:
        "202":
          description: Notificación encolada para envío.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        "403":
          description: Sin permiso `APPROVE_INCIDENT`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Incidencia no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Justify Attendance ────────────────────────────────────────────────
  /incidentes/{id}/justificar:
    parameters:
      - $ref: '#/components/parameters/IncidentId'
      - $ref: '#/components/parameters/TenantIdHeader'

    post:
      tags:
        - Incidencias
      summary: Justificar asistencia por incidencia aprobada
      operationId: justifyIncident
      description: |
        **Endpoint asíncrono** que marca los días de asistencia afectados
        como "justificados" para una incidencia ya aprobada.

        **Flujo:**
        1. El endpoint `PATCH /incidentes/{id}/estado` (al aprobar) dispara
           este endpoint de forma asíncrona.
        2. Este endpoint consulta los registros de asistencia del trabajador
           en el período cubierto (`start_date` a `end_date`) y los marca
           como justificados.
        3. Si no existe `incidents_permission` (ej. tardanza de 1 día),
           se justifica únicamente el día de la incidencia.

        **Principio SOLID:** este endpoint existe para mantener la atomicidad
        del endpoint de aprobación, separando la responsabilidad de justificar
        asistencia en un proceso independiente.

        **Permisos requeridos:** El sistema interno (sin exposición directa
        al frontend). Invocado por `APPROVE_INCIDENT`.
      responses:
        "202":
          description: Proceso de justificación encolado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        "400":
          description: La incidencia no está en estado `APROBADO`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Incidencia no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ----------------------------------------
  # MÓDULO: WEBSOCKET CONFIGURATION
  # ----------------------------------------
  /ws/incidents:
    get:
      tags:
        - WebSocket
      summary: Información de conexión WebSocket para incidencias
      description: |
        Endpoint informativo que describe la configuración de WebSocket
        para el módulo de incidencias.

        ## Configuración STOMP

        **Endpoint de conexión:** `/ws/incidents`
        **Protocolo:** STOMP sobre WebSocket (SockJS como fallback)

        **Autenticación:**
        Se usa el mismo esquema seguro del REST API durante el handshake
        WebSocket, enviando el JWT y tenant por headers:
        ```
        Authorization: Bearer <JWT>
        X-Tenant-ID: <tenant-uuid>
        ```
        No se debe enviar el JWT como query parameter.

        **Canales de suscripción:**

        | Canal | Receptor | Descripción |
        |-------|----------|-------------|
        | `/user/{userId}/queue/incidents` | Trabajador | Notificaciones de cambio de estado de sus incidencias. `{userId}` = `tenant_user_id`; el STOMP Principal interno es `{tenantUuid}:{userId}`. |
        | `/topic/tenant/{tenantId}/incidents` | Supervisores | Notificaciones de nuevas incidencias creadas (fin de turno) |

        **Payload de notificación:**
        ```json
        {
          "tipo": "INCIDENCIA_ESTADO",
          "incidencia_id": 42,
          "tenant_user_id": 15,
          "estado_anterior": "PENDIENTE",
          "estado_nuevo": "APROBADO",
          "timestamp": "2026-06-23T15:30:00Z",
          "mensaje": "Tu incidencia ha sido aprobada."
        }
        ```

        **Aislamiento:**
        - Usuarios del Tenant A no reciben eventos del Tenant B.
        - Cada usuario recibe solo sus propias notificaciones.
        - El aislamiento se logra mediante la combinación de:
          1. JWT validado al conectar: `tenant_id` vincula al tenant;
             el `sub` se combina como `{tenantUuid}:{sub}` para el
             `Principal.getName()` de STOMP, garantizando unicidad
             global.
          2. Canales `/user/{userId}/queue/` — aunque el path muestre
             el `tenant_user_id` numérico, el broker STOMP enruta por
             el Principal compuesto (`{tenantUuid}:{userId}`), no por
             el ID simple.
          3. El topic `/topic/tenant/{tenantId}/` incluye el `tenant_id`
             como parte del channel, imposibilitando la escucha cruzada.
      responses:
        "200":
          description: Información de configuración WebSocket.
          content:
            application/json:
              schema:
                type: object
                properties:
                  endpoint:
                    type: string
                    example: "/ws/incidents"
                  protocol:
                    type: string
                    example: "STOMP"
                  auth_method:
                    type: string
                    example: "Authorization Bearer header + X-Tenant-ID"
                  channels:
                    type: array
                    items:
                      type: object
                      properties:
                        channel:
                          type: string
                        description:
                          type: string

  # ══════════════════════════════════════════════════════════════════════
  # MÓDULO COREHR: /corehr
  # Contexto: tenant_{slug}_db · Requiere X-Tenant-ID
  # ══════════════════════════════════════════════════════════════════════

  # ────────────────────────────────────────────────────────────────────
  # SHIFTS (Turnos)
  # ────────────────────────────────────────────────────────────────────
  /corehr/shifts:
    get:
      tags:
        - CoreHR · Shifts
      summary: Listar turnos del tenant
      operationId: listShifts
      description: |
        Devuelve los turnos definidos en el tenant.
        Cada turno incluye sus schedules asociados en el campo `schedules`.
        Cacheado en Redis (`shifts:{tenant_id}`, TTL 10 min). Se invalida
        al crear, editar o eliminar un shift o cualquiera de sus schedules.

        **Permisos requeridos:** `MANAGE_SCHEDULES`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        "200":
          description: Lista paginada de turnos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShiftListResponse'
        "403":
          description: Sin permiso `MANAGE_SCHEDULES`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - CoreHR · Shifts
      summary: Crear un nuevo turno
      operationId: createShift
      description: |
        Crea un turno. Los schedules se crean por separado vía `POST /corehr/schedules`.
        Invalida caché Redis de shifts.

        **Permisos requeridos:** `MANAGE_SCHEDULES`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShiftRequest'
      responses:
        "201":
          description: Turno creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShiftProfile'
        "403":
          description: Sin permiso `MANAGE_SCHEDULES`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Ya existe un turno con ese nombre en el tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /corehr/shifts/{id}:
    parameters:
      - $ref: '#/components/parameters/ShiftId'
      - $ref: '#/components/parameters/TenantIdHeader'

    get:
      tags:
        - CoreHR · Shifts
      summary: Obtener un turno por ID
      operationId: getShiftById
      description: |
        Devuelve el turno con sus schedules y tolerancias anidadas.
        **Permisos requeridos:** `MANAGE_SCHEDULES`
      responses:
        "200":
          description: Turno encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShiftProfile'
        "404":
          description: Turno no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags:
        - CoreHR · Shifts
      summary: Actualizar parcialmente un turno
      operationId: patchShift
      description: |
        Actualiza nombre y/o descripción del turno.
        Invalida caché Redis de shifts.
        **Permisos requeridos:** `MANAGE_SCHEDULES`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchShiftRequest'
      responses:
        "200":
          description: Turno actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShiftProfile'
        "403":
          description: Sin permiso `MANAGE_SCHEDULES`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Turno no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - CoreHR · Shifts
      summary: Eliminar un turno
      operationId: deleteShift
      description: |
        Elimina un turno. **Solo si no tiene schedules ni user_schedules activos.**
        Si tiene dependencias, se responde `409`.
        Invalida caché Redis de shifts.
        **Permisos requeridos:** `MANAGE_SCHEDULES`
      responses:
        "204":
          description: Turno eliminado.
        "403":
          description: Sin permiso `MANAGE_SCHEDULES`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Turno no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: El turno tiene schedules o asignaciones activas. No se puede eliminar.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ────────────────────────────────────────────────────────────────────
  # SCHEDULES (Horarios)
  # ────────────────────────────────────────────────────────────────────
  /corehr/schedules:
    get:
      tags:
        - CoreHR · Schedules
      summary: Listar schedules del tenant
      operationId: listSchedules
      description: |
        Devuelve schedules con sus tolerancias anidadas.
        Cacheado en Redis (`schedules:{tenant_id}`, TTL 10 min).
        **Permisos requeridos:** `MANAGE_SCHEDULES`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - name: shift_id
          in: query
          required: false
          description: "Filtra schedules de un turno específico."
          schema:
            type: integer
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        "200":
          description: Lista paginada de schedules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleListResponse'
        "403":
          description: Sin permiso `MANAGE_SCHEDULES`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - CoreHR · Schedules
      summary: Crear un nuevo schedule (horario)
      operationId: createSchedule
      description: |
        Crea un horario dentro de un turno existente.
        Las tolerancias se crean por separado vía `POST /corehr/schedules/{id}/tolerancias`.
        Invalida caché Redis de schedules.
        **Permisos requeridos:** `MANAGE_SCHEDULES`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduleRequest'
      responses:
        "201":
          description: Schedule creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleProfile'
        "403":
          description: Sin permiso `MANAGE_SCHEDULES`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: El `shift_id` no existe en este tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: "`departure_time` no puede ser anterior o igual a `entry_time`."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /corehr/schedules/{id}:
    parameters:
      - $ref: '#/components/parameters/ScheduleId'
      - $ref: '#/components/parameters/TenantIdHeader'

    get:
      tags:
        - CoreHR · Schedules
      summary: Obtener un schedule por ID
      operationId: getScheduleById
      description: |
        Devuelve el schedule con tolerancias anidadas.
        **Permisos requeridos:** `MANAGE_SCHEDULES`
      responses:
        "200":
          description: Schedule encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleProfile'
        "404":
          description: Schedule no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags:
        - CoreHR · Schedules
      summary: Actualizar parcialmente un schedule
      operationId: patchSchedule
      description: |
        Actualiza campos del schedule. `shift_id` no es modificable.
        Invalida caché Redis de schedules y recalcula `minutes_late`
        de asistencias futuras que usen este schedule.
        **Permisos requeridos:** `MANAGE_SCHEDULES`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchScheduleRequest'
      responses:
        "200":
          description: Schedule actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleProfile'
        "403":
          description: Sin permiso `MANAGE_SCHEDULES`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Schedule no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: "`departure_time` no puede ser anterior o igual a `entry_time`."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - CoreHR · Schedules
      summary: Eliminar un schedule
      operationId: deleteSchedule
      description: |
        Elimina un schedule. **Solo si no tiene user_schedules ni asistencias activas.**
        Si tiene dependencias, se responde `409`.
        Invalida caché Redis de schedules.
        **Permisos requeridos:** `MANAGE_SCHEDULES`
      responses:
        "204":
          description: Schedule eliminado.
        "409":
          description: El schedule tiene user_schedules o asistencias activas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Schedule no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ────────────────────────────────────────────────────────────────────
  # TOLERANCIAS (sub-recurso de schedule)
  # ────────────────────────────────────────────────────────────────────
  /corehr/schedules/{id}/tolerancias:
    parameters:
      - $ref: '#/components/parameters/ScheduleId'
      - $ref: '#/components/parameters/TenantIdHeader'

    get:
      tags:
        - CoreHR · Tolerancias
      summary: Listar tolerancias de un schedule
      operationId: listToleranciasBySchedule
      description: |
        Devuelve todas las tolerancias (activas e inactivas) de un schedule.
        **Permisos requeridos:** `MANAGE_SCHEDULES`
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        "200":
          description: Lista de tolerancias.
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/ToleranciaProfile'
                  page:
                    type: integer
                  totalElements:
                    type: integer
        "404":
          description: Schedule no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - CoreHR · Tolerancias
      summary: Crear una tolerancia para un schedule
      operationId: createTolerancia
      description: |
        Agrega una tolerancia a un schedule.
        Solo puede existir una tolerancia activa por `type` por schedule.
        Si ya existe una activa del mismo tipo, se responde `409`.
        **Permisos requeridos:** `MANAGE_SCHEDULES`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateToleranciaRequest'
      responses:
        "201":
          description: Tolerancia creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToleranciaProfile'
        "403":
          description: Sin permiso `MANAGE_SCHEDULES`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Schedule no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Ya existe una tolerancia activa del mismo `type` para este schedule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /corehr/schedules/{id}/tolerancias/{toleranciaId}:
    parameters:
      - $ref: '#/components/parameters/ScheduleId'
      - $ref: '#/components/parameters/ToleranciaId'
      - $ref: '#/components/parameters/TenantIdHeader'

    patch:
      tags:
        - CoreHR · Tolerancias
      summary: Actualizar una tolerancia
      operationId: patchTolerancia
