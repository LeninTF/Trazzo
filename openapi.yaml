          example: 42
        nombre:
          type: string
          example: "Carlos"
        apellido_paterno:
          type: string
          example: "Mendoza"
        apellido_materno:
          type: string
          example: "González"
        email:
          type: string
          example: "carlos.mendoza@colegio.edu.pe"
        status:
