openapi: 3.0.3
info:
  title: Trazzo SaaS Integrated API Contract
  description: |
    Contrato API para la plataforma multi-tenant Trazzo.
    ## Arquitectura de bases de datos
      ```
      master_db          → Usuarios Trazzo, RolesMaster, Tenants, Plans, Permissions (catálogo)
      tenant_{slug}_db   → TenantUsers, Roles (tenant), RolePermissions, Persons, ...
      ```

      ## Separación de rutas por contexto
      | Prefijo       | Contexto         | Requiere          | Base de datos    |
      |---------------|-----------------|-------------------|-----------------|
      | `/saas/users` | Panel Trazzo    | MasterRole válido | `master_db`      |
      | `/usuarios`   | Panel Tenant    | TenantRole válido | `tenant_{slug}_db` |
      | `/incidentes` | Panel Tenant    | TenantRole válido | `tenant_{slug}_db` |
      | `/corehr`     | Panel Tenant    | TenantRole válido | `tenant_{slug}_db` |

    ## ⚠️ Breaking Changes v3.0.0
    - `/asistencia/marcar` y `/asistencia/sync` refactorizados con nuevo schema coreHR.
      Los campos `dispositivoId`, `templateCifrado`, `llaveAesCifrada` ahora usan
      los identificadores de `device.code` y `usuario_biometria` del módulo coreHR.
    - Se agrega `branch_id` (sede) obligatorio en `device`.
    - `user_shift` renombrado a `user_schedule` (tabla y endpoints).
    - Se agrega campo `minutes` (INT, 0-60) a tabla `tolerancia`.
  # Cubre Autenticación, Gestión de Usuarios, Control de Asistencia Biométrica e Incidencias.
  version: 3.0.0
servers:
  - url: https://api.trazzo.pe/api/v1
    description: Servidor Central de Producción

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT firmado por Spring Boot. El payload incluye:
        - `sub`: ID numérico del TenantUser dentro del tenant (para REST).
          Para WebSocket STOMP, el Principal es compuesto
          `{tenantUuid}:{sub}` (ver secciones WebSocket).
        - `tenant_id`: UUID del tenant (null para usuarios Trazzo)
        - `context`: `MASTER` | `TENANT`
        - `must_change_password`: boolean
    tenantHeader:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: |
        UUID del tenant. Obligatorio en todas las rutas `/usuarios/*`.
        Omitir en rutas `/saas/*`. El backend valida que coincida con
        el `tenant_id` embebido en el JWT.

  parameters:
    # ─── Parámetros de ruta ────────────────────────────────────────────────
    UsuarioId:
      name: id
      in: path
      required: true
      description: ID único del usuario (TenantUser) a operar.
      schema:
        type: integer
        example: 42

    MasterUserId:
      name: id
      in: path
      required: true
      description: ID único del usuario Trazzo (Users en master_db).
      schema:
        type: integer
        example: 7
    
    TenantIdHeader:
      name: X-Tenant-ID
      in: header
      required: true
      description: UUID del tenant al que pertenece la solicitud.
      schema:
        type: string
        format: uuid
        example: "a1b2c3d4-0000-0000-0000-000000000001"

    # ─── Query params de paginación ────────────────────────────────────────
    PageParam:
      name: page
      in: query
      required: false
      description: Número de página (base 0).
      schema:
        type: integer
        default: 0
        minimum: 0

    SizeParam:
      name: size
      in: query
      required: false
      description: Cantidad de registros por página.
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

    SortParam:
      name: sort
      in: query
      required: false
      description: "Campo de ordenamiento. Ejemplos: `father_surname,asc` | `ultimo_acceso,desc`"
      schema:
        type: string
        example: "father_surname,asc"

    # ─── Query params de filtro y scope ───────────────────────────────────
    ScopeParam:
      name: scope
      in: query
      required: false
      description: |
        Alcance de visibilidad. Solo relevante para usuarios con el permiso
        `VIEW_TENANT_USERS` pero sin `VIEW_ALL_TENANT_USERS`.
        - `MY_ASSIGNMENTS` *(default)*: usuarios de las sedes/áreas/departamentos
          a los que el solicitante está asignado.
        - `SEDE`: todos los usuarios de la sede indicada en `branch_id`.
        - `AREA`: todos los usuarios del área indicada en `area_id`.
        - `DEPARTAMENTO`: todos los usuarios del departamento indicado en `departamento_id`.
        Ignorado si el solicitante tiene `VIEW_ALL_TENANT_USERS`.
      schema:
        type: string
        enum: [MY_ASSIGNMENTS, SEDE, AREA, DEPARTAMENTO]
        default: MY_ASSIGNMENTS

    IncidentScopeParam:
      name: scope
      in: query
      required: false
      description: |
        Alcance de visibilidad para incidencias. Se resuelve segun los permisos
        del JWT y puede restringirse con los filtros de ubicacion/asignacion.
        - `ALL_TENANT`: todas las incidencias del tenant.
        - `MY_ASSIGNMENTS` *(default)*: incidencias de las sedes/areas/departamentos
          a los que el solicitante esta asignado.
        - `SEDE`: incidencias de la sede indicada en `sede_id`.
        - `AREA`: incidencias del area indicada en `area_id`.
        - `DEPARTAMENTO`: incidencias del departamento indicado en `departamento_id`.
        - `SELF`: incidencias propias del solicitante.
      schema:
        type: string
        enum: [ALL_TENANT, MY_ASSIGNMENTS, SEDE, AREA, DEPARTAMENTO, SELF]
        default: MY_ASSIGNMENTS

    AreaIdParam:
      name: area_id
      in: query
      required: false
      description: Filtra usuarios de un área específica. Requerido cuando `scope=AREA`.
      schema:
        type: integer
        example: 7

    DepartamentoIdParam:
      name: departamento_id
      in: query
      required: false
      description: Requerido cuando `scope=DEPARTAMENTO`.
      schema:
        type: integer
        example: 2

    IncidentSedeIdParam:
      name: sede_id
      in: query
      required: false
      description: Filtra incidencias por una sede especifica. Requerido cuando `scope=SEDE`.
      schema:
        type: integer
        example: 3

    IncidentAreaIdParam:
      name: area_id
      in: query
      required: false
      description: Filtra incidencias por un area especifica. Requerido cuando `scope=AREA`.
      schema:
        type: integer
        example: 7

    IncidentDepartamentoIdParam:
      name: departamento_id
      in: query
      required: false
      description: Filtra incidencias por un departamento especifico. Requerido cuando `scope=DEPARTAMENTO`.
      schema:
        type: integer
        example: 2
  
    StatusParam:
      name: status
      in: query
      required: false
      description: Filtra por estado del usuario.
      schema:
        type: string
        enum: [ACTIVO, LICENCIA, INACTIVO]

    RoleIdParam:
      name: role_id
      in: query
      required: false
      description: Filtra por rol asignado (ID del rol en tenant_db).
      schema:
        type: integer
        example: 2

    SearchParam:
      name: search
      in: query
      required: false
      description: "Búsqueda libre por nombre, apellido o email (ILIKE)."
      schema:
        type: string
        example: "mendoza"

    # ─── Query param exclusivo de ADMIN_SAAS ──────────────────────────────
    TenantIdFilterParam:
      name: tenant_id
      in: query
      required: false
      description: |
        **Solo disponible para `ADMIN_SAAS`.**
        Filtra usuarios de un tenant específico.
        Si se omite, devuelve usuarios de todos los tenants.
      schema:
        type: string
        format: uuid

    # ─── Parámetros para Incidencias ───────────────────────────────────────
    IncidentId:
      name: id
      in: path
      required: true
      description: ID único de la incidencia.
      schema:
        type: integer
        example: 42

    IncidentTypeId:
      name: id
      in: path
      required: true
      description: ID único del tipo de incidencia.
      schema:
        type: integer
        example: 5

    IncidentEvidenceId:
      name: evidenceId
      in: path
      required: true
      description: ID único de la evidencia.
      schema:
        type: integer
        example: 12

    IncidentStateParam:
      name: state
      in: query
      required: false
      description: Filtra incidencias por estado.
      schema:
        type: string
        enum: [PENDIENTE, APROBADO, DENEGADO]

    IncidentTypeFilterParam:
      name: tipo_id
      in: query
      required: false
      description: Filtra incidencias por tipo.
      schema:
        type: integer
        example: 3

    DateFromParam:
      name: desde
      in: query
      required: false
      description: Filtra incidencias creadas desde esta fecha (inclusive).
      schema:
        type: string
        format: date
        example: "2026-01-01"

    DateToParam:
      name: hasta
      in: query
      required: false
      description: Filtra incidencias creadas hasta esta fecha (inclusive).
      schema:
        type: string
        format: date
        example: "2026-12-31"


    ShiftId:
      name: id
      in: path
      required: true
      description: ID único del turno (shift).
      schema:
        type: integer
        example: 1

    ScheduleId:
      name: id
      in: path
      required: true
      description: ID único del schedule (horario).
      schema:
        type: integer
        example: 3

    ToleranciaId:
      name: toleranciaId
      in: path
      required: true
      description: ID único de la tolerancia.
      schema:
        type: integer
        example: 2

    DeviceId:
      name: id
      in: path
      required: true
      description: ID único del dispositivo.
      schema:
        type: integer
        example: 1

    BiometriaId:
      name: id
      in: path
      required: true
      description: ID único del registro biométrico.
      schema:
        type: integer
        example: 5

    UserScheduleId:
      name: id
      in: path
      required: true
      description: ID único de la asignación de schedule a usuario.
      schema:
        type: integer
        example: 7

    AttendanceId:
      name: id
      in: path
      required: true
      description: UUID del registro de asistencia.
      schema:
        type: string
        format: uuid

    NonWorkingDayId:
      name: id
      in: path
      required: true
      description: ID único del día no laborable.
      schema:
        type: integer
        example: 1

    TenantContactId:
      name: id
      in: path
      required: true
      description: ID único del tenant contact.
      schema:
        type: integer
        example: 3

    TenantUserDepartmentId:
      name: id
      in: path
      required: true
      description: ID único de la asignación de departamento.
      schema:
        type: integer
        example: 10

    AttendanceDateFromParam:
      name: date_from
      in: query
      required: false
      description: "Filtra registros de asistencia desde esta fecha (inclusive). Formato: YYYY-MM-DD."
      schema:
        type: string
        format: date
        example: "2026-06-01"

    AttendanceDateToParam:
      name: date_to
      in: query
      required: false
      description: "Filtra registros de asistencia hasta esta fecha (inclusive). Formato: YYYY-MM-DD."
      schema:
        type: string
        format: date
        example: "2026-06-30"

    AttendanceStateParam:
      name: state
      in: query
      required: false
      description: "Filtra por estado del registro de asistencia."
      schema:
        type: string
        enum: [PUNTUAL, TARDANZA, FALTA]

    BranchIdParam:
      name: branch_id
      in: query
      required: false
      description: "Filtra por sede (branch). Requerido cuando `scope=SEDE`."
      schema:
        type: integer
        example: 2


  schemas:
    # ==========================================
    # SECCIÓN: ROLES Y PERMISOS (Catálogo de Seguridad)
    # ==========================================
    PermissionProfile:
      type: object
      description: "Permiso del catálogo Trazzo (Permissions en tenant_db)."
      properties:
        id:
          type: integer
          example: 15
        name:
          type: string
          example: "VIEW_USUARIOS"
        descripcion:
          type: string
          example: "Permite visualizar el listado de usuarios del tenant."
        master_features_code:
          type: string
          nullable: true
          description: "Código de feature en master_db que habilita este permiso según plan."
          example: "FEATURE_USER_MGMT"
        context:
          type: string
          enum: [MASTER, TENANT]
          description: "Contexto donde aplica el permiso. MASTER = solo usuarios Trazzo."
          example: "TENANT"

    TenantRoleProfile:
      type: object
      description: "Rol creado y personalizado dentro del tenant (Roles en tenant_db)."
      properties:
        id:
          type: integer
          example: 3
        name:
          type: string
          example: "Director"
        descripcion:
          type: string
          nullable: true
          example: "Rol para directores de sede con visibilidad total del tenant."
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/PermissionProfile'

    MasterRoleProfile:
      type: object
      description: "Rol del equipo Trazzo (RolesMaster en master_db)."
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "admin_trazzo"
        descripcion:
          type: string
          nullable: true
    # ==========================================
    # SECCIÓN: COMPONENTES DE SEGURIDAD Y AUTH
    # ==========================================
    PersonaBase:
      type: object
      description: "Datos personales (Persons en master_db, compartido entre contextos)."
      properties:
        id:
          type: integer
        img_url:
          type: string
          format: uri
          nullable: true
        document_type:
          type: string
          enum: [DNI, CARNET_EXTRANJERIA, PASAPORTE, OTRO]
        document_value:
          type: string
          example: "76543210"
        name:
          type: string
          example: "Josselin Anais"
        father_surname:
          type: string
          example: "Rojas"
        mother_surname:
          type: string
          example: "Luque"
        birth_date:
          type: string
          format: date
          nullable: true
          example: "1990-01-01"
    
    MetodoRecuperacionEntry:
      type: object
      properties:
        method_type:
          type: string
          enum: [EMAIL, PHONE]
        method_value:
          type: string
          example: "admincolegio@colegio.edu.pe"
    
    TenantUserProfile:
      type: object
      description: |
        Perfil completo de un usuario de tenant.
        Combina datos de `Users` (master_db) + `TenantUser` (tenant_db) + `Persons`.
      properties:
        # Datos de TenantUser (tenant_db)
        id:
          type: integer
          description: "ID del TenantUser en tenant_db."
          example: 42
        email:
          type: string
          nullable: true
          example: "ana.is@colegio.edu.pe"
        phone:
          type: string
          nullable: true
          example: "987654321"
        estado:
          type: string
          enum: [ACTIVO, LICENCIA, INACTIVO]
          example: "ACTIVO"
        must_change_password:
          type: boolean
          description: "True si el usuario aún no ha cambiado su contraseña temporal."
          example: false
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        # Datos de Persons (master_db)
        persona:
          $ref: '#/components/schemas/PersonaBase'
        # Contacto (Metodo de Recuperación en master_db)
        MetodoRecuperacion:
          type: array
          items:
            $ref: '#/components/schemas/MetodoRecuperacionEntry'
        # Rol asignado (TenantUserRol → Roles en tenant_db)
        rol:
          $ref: '#/components/schemas/TenantRoleProfile'
        # Asignaciones organizacionales
        sedes:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              nombre:
                type: string
        areas:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              nombre:
                type: string
        departamentos:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              nombre:
                type: string
    
    MasterUserProfile:
      type: object
      description: "Perfil de un usuario Trazzo (Users en master_db)."
      properties:
        id:
          type: integer
          example: 7
        email:
          type: string
          nullable: true
          example: "admin@trazzo.pe"
        phone:
          type: string
          nullable: true
          example: "987654321"
        tenant_id:
          type: string
          format: uuid
          nullable: true
          description: "null para usuarios puramente SaaS sin asignación a tenant."
        must_change_password:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
        persona:
          $ref: '#/components/schemas/PersonaBase'
        MetodoRecuperacion:
          type: array
          items:
            $ref: '#/components/schemas/MetodoRecuperacionEntry'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/MasterRoleProfile'
        tenant_info:
          type: object
          nullable: true
          description: "Datos del tenant al que pertenece. Presente para admin_trazzo con permiso VIEW_ALL_TENANTS."
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
            slug:
              type: string
              example: "colegio-santa-rosa"
    
    # ── Listas paginadas ──────────────────────────────────────────────────
    TenantUserListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/TenantUserProfile'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer
        scope_aplicado:
          type: string
          enum: [ALL_TENANT, MY_ASSIGNMENTS, SEDE, AREA, DEPARTAMENTO, SELF]
          description: "Scope efectivamente aplicado por el backend."
          example: "MY_ASSIGNMENTS"
    
    MasterUserListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/MasterUserProfile'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    # ── Request bodies para creación ─────────────────────────────────────
    CrearTenantUsuarioRequest:
      type: object
      required:
        - document_type
        - document_value
        - name
        - father_surname
        - mother_surname
        - email
        - role_id
      description: |
        Crea un usuario de tenant. La **contraseña no se recibe**: el backend
        genera una contraseña temporal aleatoria y la envía al `email`
        (workflow de activación). El usuario queda con `must_change_password = true`.
      properties:
        document_type:
          type: string
          enum: [DNI, CARNET_EXTRANJERIA, PASAPORTE, OTRO]
          example: "DNI"
        document_value:
          type: string
          description: "Clave de búsqueda para reutilizar Persona existente en master_db."
          example: "76543210"
        name:
          type: string
          example: "Josselin Anais"
        father_surname:
          type: string
          example: "Rojas"
        mother_surname:
          type: string
          example: "Luque"
        birth_date:
          type: string
          format: date
          nullable: true
        img_url:
          type: string
          format: uri
          nullable: true
        email:
          type: string
          format: email
          description: "Email principal (credencial de login). Debe ser único en el tenant."
          example: "ana.rojas@colegio.edu.pe"
        emails_adicionales:
          type: array
          nullable: true
          description: "Email secundarios utilizados para recuperación de contraseña."
          items:
            type: string
            format: email
        phone:
          type: string
          nullable: true
          example: "+51987654321"
        phones_adicionales:
          type: array
          nullable: true
          description: "Teléfonos secundarios utilizados para recuperación de contraseña."
          items:
            type: string
        role_id:
          type: integer
          description: |
            ID del TenantRole a asignar. Debe existir en `tenant_db`.
            El rol asignado no puede tener más permisos que el rol del usuario
            que ejecuta la creación (regla anti-escalation).
          example: 3
        sede_ids:
          type: array
          nullable: true
          items:
            type: integer
          example: [1]
        area_ids:
          type: array
          nullable: true
          items:
            type: integer
          example: [7]
        departamento_ids:
          type: array
          nullable: true
          items:
            type: integer

    CrearMasterUsuarioRequest:
      type: object
      required:
        - document_type
        - document_value
        - name
        - father_surname
        - mother_surname
        - email
        - role_ids
      description: |
        Crea un usuario del equipo Trazzo en `master_db`. Solo accesible con
        MasterRole que tenga permiso `CREATE_MASTER_USER`.
        La contraseña se genera automáticamente y se envía por email
        (mismo workflow de activación).
      properties:
        document_type:
          type: string
          enum: [DNI, CARNET_EXTRANJERIA, PASAPORTE, OTRO]
        document_value:
          type: string
        name:
          type: string
        father_surname:
          type: string
        mother_surname:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        role_ids:
          type: array
          items:
            type: integer
          description: "IDs de MasterRoles a asignar."
          example: [1]
    
    # ── Request bodies para actualización ────────────────────────────────
    ActualizarTenantUsuarioRequest:
      type: object
      required:
        - document_type
        - document_value
        - name
        - father_surname
        - mother_surname
        - email
        - role_id
      description: |
        **PUT — Actualización completa del usuario de tenant.**
        Reemplaza todos los datos editables. La contraseña y el `estado`
        (status laboral) no se modifican por este endpoint.
        `document_value` y `document_type` son inmutables una vez creados;
        si se envían valores distintos, se responde `422`.
      properties:
        document_type:
          type: string
          enum: [DNI, CARNET_EXTRANJERIA, PASAPORTE, OTRO]
        document_value:
          type: string
          description: "Solo para verificación. No se modifica."
        name:
          type: string
        father_surname:
          type: string
        mother_surname:
          type: string
        birth_date:
          type: string
          format: date
          nullable: true
        img_url:
          type: string
          format: uri
          nullable: true
        email:
          type: string
          format: email
        emails_adicionales:
          type: array
          nullable: true
          items:
            type: string
            format: email
        phone:
          type: string
          nullable: true
        phones_adicionales:
          type: array
          nullable: true
          items:
            type: string
        role_id:
          type: integer
          description: "Reemplaza el rol actual. Sujeto a regla anti-escalation."
        cargo:
          type: string
          nullable: true
        sede_ids:
          type: array
          nullable: true
          items:
            type: integer
        area_ids:
          type: array
          nullable: true
          items:
            type: integer
        departamento_ids:
          type: array
          nullable: true
          items:
            type: integer

    PatchTenantUsuarioRequest:
      type: object
      minProperties: 1
      description: |
        **PATCH — Actualización parcial (merge-patch, RFC 7396).**
        Solo los campos enviados se modifican. Los arrays reemplazan la colección completa.

        **Casos de uso principales:**
        - Cambiar `estado`: `ACTIVO → LICENCIA`, `LICENCIA → ACTIVO`, `ACTIVO → INACTIVO` (baja funcional).
          `INACTIVO → ACTIVO` equivale a reactivación y genera auditoría `REACTIVACION`.
        - Reasignar `role_id` (sujeto a anti-escalation y permiso `ASSIGN_ROLES`).
        - Actualizar `cargo`, teléfono o foto.

        **Campos bloqueados en PATCH** (siempre `403` si se intenta):
        - `document_type`, `document_value` (inmutables).
        - `role_id` por usuarios sin permiso `ASSIGN_ROLES`.
      properties:
        name:
          type: string
        father_surname:
          type: string
        mother_surname:
          type: string
        birth_date:
          type: string
          format: date
          nullable: true
        img_url:
          type: string
          format: uri
          nullable: true
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        cargo:
          type: string
          nullable: true
        estado:
          type: string
          enum: [ACTIVO, LICENCIA, INACTIVO]
          description: |
            Cambio de estado laboral.
            - `INACTIVO`: baja funcional (soft-delete). El usuario no puede iniciar sesión.
            - `ACTIVO` sobre un usuario `INACTIVO`: reactivación. Registra auditoría `REACTIVACION`.
        role_id:
          type: integer
          description: "Requiere permiso `ASSIGN_ROLES`. Sujeto a anti-escalation."
        sede_ids:
          type: array
          items:
            type: integer
          nullable: true
        area_ids:
          type: array
          items:
            type: integer
          nullable: true
        departamento_ids:
          type: array
          items:
            type: integer
          nullable: true

    AsignarRolRequest:
      type: object
      required:
        - role_id
      description: |
        **PUT /usuarios/{id}/rol — Endpoint dedicado para reasignación de rol.**
        Útil para el modal de gestión de roles en el frontend,
        sin necesidad de enviar todos los datos del usuario.
        Sujeto a regla anti-escalation y requiere permiso `ASSIGN_ROLES`.
      properties:
        role_id:
          type: integer
          example: 5

    CambiarPasswordRequest:
      type: object
      description: |
        Cambio de contraseña.
         - Para primer login forzado (`must_change_password = true`) o reset administrativo, `current_password` puede omitirse.
         - Para cambio voluntario, `current_password` es obligatoria.
         - `new_password` es requerida cuando el usuario está definiendo su nueva contraseña; en reset administrativo el backend puede generar una temporal.
      properties:
        current_password:
          type: string
          format: password
          description: "Obligatoria para cambios voluntarios. Omitir en primer login forzado o reset administrativo."
        new_password:
          type: string
          format: password
          minLength: 8
          description: "Nueva contraseña en texto plano. Spring Boot aplica BCrypt."

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admincolegio@colegio.edu.pe
        password:
          type: string
          format: password
          example: "SuperSecret123!"

    RegistroUsuarioRequest:
      type: object
      required:
        - document_type
        - document_value
        - name
        - father_surname
        - mother_surname
        - email
        - phone
        - password
        - role_ids
      properties:
        document_type:
          type: string
          enum: [DNI, CARNET_EXTRANJERIA, PASAPORTE, OTRO]
          description: "Tipo de documento de identidad oficial."
          example: "DNI"
        document_value:
          type: string
          description: "Número del documento. Usado como llave de búsqueda para la Persona."
          example: "76543210"
        name:
          type: string
          example: "Carlos"
        father_surname:
          type: string
          example: "Mendoza"
        mother_surname:
          type: string
          example: "González"
        phone:
          type: string
          example: "+51987654321"
        img_url:
          type: string
          format: uri
          nullable: true
          description: "URL pública o de acceso de la imagen de perfil alojada en Cloudflare R2."
          example: "https://r2.trazzo.pe/profiles/76543210.jpg"
        email:
          type: string
          format: email
          description: "Correo que servirá como credencial de inicio de sesión."
          example: "carlos.mendoza@colegio.edu.pe"
        password:
          type: string
          format: password
          description: "Contraseña en texto plano para que Spring Boot la encripte."
        birth_date:
          type: string
          format: date
          description: "Fecha de nacimiento del usuario."
          nullable: true
          example: "1990-01-01"
        role_ids:
          type: array
          items:
            type: integer
          description: "Lista de IDs de los roles que se asignarán al usuario (Tabla pivote UserRoles)."
          example: [1, 3]

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: "JWT Token firmado para acceso a endpoints protegidos."
        tokenType:
          type: string
          example: "Bearer"
        usuario:
          $ref: "#/components/schemas/UsuarioProfile"

    # --- ESQUEMAS DE SALIDA ---
    PersonaProfile:
      type: object
      description: "Datos personales desvinculados de las credenciales de acceso."
      properties:
        id:
          type: integer
        document_type:
          type: string
        document_value:
          type: string
        first_name:
          type: string
        father_surname:
          type: string
        mother_surname:
          type: string
        phone:
          type: string
