        file_url:
          type: string
          format: uri
          description: "URL pública del archivo en Cloudflare R2."
          example: "https://r2.trazzo.pe/evidencias/42/certificado_medico.pdf"
        mime_type:
          type: string
          example: "application/pdf"
        file_size:
          type: integer
          description: "Tamaño del archivo en bytes."
          example: 1048576
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IncidentPermissionProfile:
      type: object
      description: |
        Registro de permiso asociado a una incidencia aprobada.
        Solo se crea cuando una incidencia es aprobada y su tipo lo requiere.
      properties:
        id:
          type: integer
          example: 8
        incidencia_id:
          type: integer
          example: 42
        start_date:
          type: string
          format: date
          description: "Fecha de inicio del permiso (calculada automáticamente)."
          example: "2026-06-15"
        end_date:
          type: string
          format: date
          description: "Fecha de fin del permiso (calculada automáticamente)."
          example: "2026-06-17"
        days_granted:
          type: integer
          description: "Días otorgados (ingresado por el administrador al aprobar)."
          example: 3
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IncidentProfile:
      type: object
      description: "Perfil completo de una incidencia de asistencia."
      properties:
        id:
          type: integer
          example: 42
        tenant_user_id:
          type: integer
          description: "ID del trabajador afectado (TenantUser)."
          example: 15
        incidencia_type_id:
          type: integer
          description: "ID del tipo de incidencia."
          example: 5
        state:
          type: string
          enum: [PENDIENTE, APROBADO, DENEGADO]
          example: "PENDIENTE"
        comment:
          type: string
          nullable: true
          description: |
            Comentario o justificación del trabajador.
            Almacenado en Redis para acceso rápido.
          example: "Adjunto certificado médico por inasistencia del 15 al 17 de junio"
        tipo:
          $ref: '#/components/schemas/IncidentTypeProfile'
        permiso:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/IncidentPermissionProfile'
        evidencias:
          type: array
          maxItems: 1
          items:
            $ref: '#/components/schemas/IncidentEvidenceProfile'
        tenant_user:
          type: object
          description: "Datos básicos del trabajador afectado."
          properties:
            id:
              type: integer
            nombre:
              type: string
            apellido_paterno:
              type: string
            apellido_materno:
              type: string
            email:
              type: string
              format: email
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IncidentListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/IncidentProfile'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer
        scope_aplicado:
          type: string
          enum: [ALL_TENANT, MY_ASSIGNMENTS, SEDE, AREA, DEPARTAMENTO, SELF]
          example: "MY_ASSIGNMENTS"

    # ── Request bodies ────────────────────────────────────────────────────
    CreateIncidentRequest:
      type: object
      required:
        - incidencia_type_id
      description: |
        Crea una nueva incidencia en estado `PENDIENTE`.

        **Origen de creación:**
        - **Manual (trabajador):** el `tenant_user_id` se obtiene del JWT
          (el trabajador crea su propia incidencia).
        - **Automática (sistema):** el sistema crea la incidencia al detectar
          falta al finalizar el turno. El `tenant_user_id` es el trabajador afectado.
          Requiere el permiso `CREATE_INCIDENT` para creación manual.

        El campo `comment` es opcional y se cachea en Redis al crearse.
      properties:
        incidencia_type_id:
          type: integer
          description: "ID del tipo de incidencia. Debe estar activo."
          example: 5
        comment:
          type: string
          nullable: true
          description: "Comentario o justificación del trabajador."
          example: "Adjunto certificado médico por inasistencia"
        tenant_user_id:
          type: integer
          nullable: true
          description: |
            Solo para creación automática por el sistema.
            Si se omite (creación manual), se usa el `sub` del JWT.
          example: 15

    PatchIncidentRequest:
      type: object
      minProperties: 1
      description: |
        **PATCH — Actualización parcial de una incidencia.**

        **Reglas:**
        - Solo se puede editar mientras está `PENDIENTE`.
        - Solo el trabajador afectado puede editar su incidencia.
        - Únicamente se puede modificar `comment`.
      properties:
        comment:
          type: string
          nullable: true
          description: |
            Comentario o justificación. Se cachea en Redis.
          example: "Adjunto nuevo certificado médico actualizado"

    IncidentStateChangeRequest:
      type: object
      required:
        - state
      description: |
        Cambio de estado de una incidencia (APROBAR o DENEGAR).

        **Reglas:**
        - Solo transiciones válidas: `PENDIENTE → APROBADO` | `PENDIENTE → DENEGADO`.
        - Solo un administrador con permiso `APPROVE_INCIDENT` puede ejecutarlo.
        - Si se aprueba con `days_granted`, el backend calcula automáticamente
          las fechas del permiso a partir de la incidencia y crea un registro
          en `incidents_permission`.
        - Al aprobar, se dispara un evento asíncrono para justificar los días
          de asistencia afectados (vía `POST /incidentes/{id}/justificar`).
        - Se notifica al trabajador vía WebSocket y email (Resend).
      properties:
        state:
          type: string
          enum: [APROBADO, DENEGADO]
          example: "APROBADO"
        days_granted:
          type: integer
          nullable: true
          description: |
            Días otorgados. Obligatorio al aprobar una incidencia que requiera
            registro de permiso (ej. licencia médica). Lo ingresa el administrador.
          example: 3
        motivo_rechazo:
          type: string
          nullable: true
          description: "Motivo del rechazo. Requerido cuando `state = DENEGADO`."
          example: "Documentación insuficiente"

    CreateEvidenceRequest:
      type: object
      required:
        - file_name
        - file_url
        - mime_type
        - file_size
      description: |
        Registra una evidencia asociada a una incidencia.

        **Flujo:**
        1. El frontend verifica que el archivo no exceda 15MB.
        2. El frontend sube el archivo directamente a Cloudflare R2 (bucket público).
        3. Cloudflare R2 devuelve la URL pública del archivo.
        4. El frontend envía la URL y metadatos al backend para su registro en BD.

        **Restricciones:**
        - Solo una evidencia por incidencia.
        - Solo se puede agregar mientras la incidencia está `PENDIENTE`
          (o antes de generar el reporte mensual).
        - Formatos permitidos: PDF, Word, imágenes, videos.
      properties:
        file_name:
          type: string
          description: "Nombre original del archivo."
          example: "certificado_medico.pdf"
        file_url:
          type: string
          format: uri
          description: "URL pública del archivo en Cloudflare R2."
          example: "https://r2.trazzo.pe/evidencias/42/certificado_medico.pdf"
        mime_type:
          type: string
          description: "Tipo MIME del archivo."
          example: "application/pdf"
        file_size:
          type: integer
          description: "Tamaño del archivo en bytes (máx 15MB = 15728640 bytes)."
          maximum: 15728640
          example: 1048576

    NotifyIncidentRequest:
      type: object
      description: |
        Dispara una notificación por email vía Resend al trabajador afectado
        informando el cambio de estado de su incidencia.
      properties:
        tipo:
          type: string
          enum: [EMAIL, SISTEMA, AMBOS]
          default: AMBOS
          description: |
            - `EMAIL`: solo envía correo vía Resend.
            - `SISTEMA`: solo notificación en el sistema (WebSocket).
            - `AMBOS`: ambas vías.
          example: "AMBOS"
      required:
        - tipo

# Forzamos por defecto que todas las transacciones utilicen Validación Dual del Tenant

    # ── Shift ─────────────────────────────────────────────────────────────
    ShiftProfile:
      type: object
      description: |
        Turno de trabajo (agrupador de schedules).
        Un Shift puede contener múltiples Schedules con distintos horarios.
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Turno Mañana"
        description:
          type: string
          nullable: true
          example: "Turno matutino para personal docente"
        schedules:
          type: array
          description: "Schedules asociados a este turno (incluidos en detalle, omitidos en listados)."
          items:
            $ref: '#/components/schemas/ScheduleSummary'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ShiftSummary:
      type: object
      description: "Resumen de turno para uso en listas y referencias cruzadas."
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Turno Mañana"

    ShiftListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ShiftProfile'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    CreateShiftRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Turno Tarde"
        description:
          type: string
          nullable: true
          example: "Turno vespertino para personal administrativo"

    PatchShiftRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          example: "Turno Tarde Actualizado"
        description:
          type: string
          nullable: true

    # ── Schedule ──────────────────────────────────────────────────────────
    ToleranciaProfile:
      type: object
      description: |
        Tolerancia asociada a un schedule.
        Define los minutos de gracia por tipo (ENTRADA, SALIDA, HORAS_EXTRA).
        Un schedule puede tener múltiples tolerancias (una por tipo).
      properties:
        id:
          type: integer
          example: 1
        schedule_id:
          type: integer
          example: 3
        name:
          type: string
          nullable: true
          example: "Tolerancia entrada docentes"
        type:
          type: string
          enum: [ENTRADA, SALIDA, HORAS_EXTRA]
          description: |
            - `ENTRADA`: minutos de gracia después de `entry_time` antes de marcar tardanza.
            - `SALIDA`: minutos de gracia antes de `departure_time` para salida anticipada.
            - `HORAS_EXTRA`: minutos adicionales después de `departure_time` computados como horas extra.
          example: "ENTRADA"
        minutes:
          type: integer
          minimum: 0
          maximum: 60
          description: "Minutos de tolerancia. 0 = sin tolerancia. Máximo 60 minutos."
          example: 10
        description:
          type: string
          nullable: true
        activo:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ScheduleProfile:
      type: object
      description: |
        Horario específico dentro de un turno.
        Define los horarios concretos de entrada y salida.
        El cálculo de tardanza usa: `minutes_late = max(0, check_in - entry_time - tolerancia_ENTRADA.minutes)`.
      properties:
        id:
          type: integer
          example: 3
        shift_id:
          type: integer
          example: 1
        shift:
          $ref: '#/components/schemas/ShiftSummary'
        name:
          type: string
          example: "Horario 7:00 - 13:00"
        description:
          type: string
          nullable: true
        entry_time:
          type: string
          format: time
          example: "07:00:00"
        departure_time:
          type: string
          format: time
          example: "13:00:00"
        tolerancias:
          type: array
          description: "Tolerancias activas asociadas a este schedule."
          items:
            $ref: '#/components/schemas/ToleranciaProfile'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ScheduleSummary:
      type: object
      description: "Resumen de schedule para uso en listas y referencias cruzadas."
      properties:
        id:
          type: integer
          example: 3
        name:
          type: string
          example: "Horario 7:00 - 13:00"
        entry_time:
          type: string
          format: time
          example: "07:00:00"
        departure_time:
          type: string
          format: time
          example: "13:00:00"

    ScheduleListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleProfile'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    CreateScheduleRequest:
      type: object
      required:
        - shift_id
        - name
        - entry_time
        - departure_time
      properties:
        shift_id:
          type: integer
          description: "ID del turno al que pertenece este schedule."
          example: 1
        name:
          type: string
          example: "Horario 7:00 - 13:00"
        description:
          type: string
          nullable: true
        entry_time:
          type: string
          format: time
          example: "07:00:00"
        departure_time:
          type: string
          format: time
          example: "13:00:00"

    PatchScheduleRequest:
      type: object
      minProperties: 1
      description: |
        Actualización parcial de un schedule.
        **Nota:** `shift_id` no es modificable (un schedule pertenece a un único shift).
        Si se necesita mover a otro shift, eliminar y recrear.
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        entry_time:
          type: string
          format: time
        departure_time:
          type: string
          format: time

    # ── Tolerancia (gestión separada) ─────────────────────────────────────
    CreateToleranciaRequest:
      type: object
      required:
        - type
        - minutes
      description: |
        Crea una tolerancia para un schedule.
        Solo puede existir una tolerancia activa por tipo por schedule.
        Si ya existe una del mismo tipo, se responde `409`.
      properties:
        name:
          type: string
          nullable: true
          example: "Tolerancia entrada docentes"
        type:
          type: string
          enum: [ENTRADA, SALIDA, HORAS_EXTRA]
          example: "ENTRADA"
        minutes:
          type: integer
          minimum: 0
          maximum: 60
          example: 10
        description:
          type: string
          nullable: true

    PatchToleranciaRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          nullable: true
        minutes:
          type: integer
          minimum: 0
          maximum: 60
        description:
          type: string
          nullable: true
        activo:
          type: boolean
          description: "false desactiva la tolerancia sin eliminarla."

    # ── UserSchedule ──────────────────────────────────────────────────────
    UserScheduleProfile:
      type: object
      description: |
        Asignación de un schedule a un trabajador.
        Un trabajador puede tener múltiples asignaciones (distintos schedules).
        La asignación aplica indefinidamente desde su creación hasta que
        sea reemplazada o eliminada explícitamente.
        El backend usa el schedule activo del trabajador para calcular tardanzas.
      properties:
        id:
          type: integer
          example: 7
        tenant_user_id:
          type: integer
          example: 42
        schedule_id:
          type: integer
          example: 3
        schedule:
          $ref: '#/components/schemas/ScheduleSummary'
        description:
          type: string
          nullable: true
          example: "Horario asignado para el año escolar 2026"
        entry_time:
          type: string
          format: time
          description: |
            Hora de entrada personalizada para este usuario en este schedule.
            Si difiere del `entry_time` del schedule, prevalece este valor
            para el cálculo de tardanza de este usuario.
          example: "07:00:00"
        departure_time:
          type: string
          format: time
          description: "Hora de salida personalizada. Prevalece sobre el schedule."
          example: "13:00:00"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserScheduleListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/UserScheduleProfile'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    CreateUserScheduleRequest:
      type: object
      required:
        - tenant_user_id
        - schedule_id
        - entry_time
        - departure_time
      description: |
        Asigna un schedule a un trabajador.
        Requiere permiso `MANAGE_USER_SHIFTS`.
      properties:
        tenant_user_id:
          type: integer
          example: 42
        schedule_id:
          type: integer
          example: 3
        description:
          type: string
          nullable: true
          example: "Horario asignado para el año escolar 2026"
        entry_time:
          type: string
          format: time
          example: "07:00:00"
        departure_time:
          type: string
          format: time
          example: "13:00:00"

    # ── Device ────────────────────────────────────────────────────────────
    DeviceProfile:
      type: object
      description: |
        Dispositivo biométrico ZKTeco registrado en el tenant.
        Identificado por `code` (número de serie) para integración con el middleware.
        Asociado a una sede (`branch_id`) para trazabilidad de marcaciones.
      properties:
        id:
          type: integer
          example: 1
        code:
          type: string
          description: "Número de serie ZKTeco. Clave de identificación para el middleware."
          example: "ZK-C2PRO-00123"
        name:
          type: string
          nullable: true
          example: "Lector Principal - Entrada Sur"
        branch_id:
          type: integer
          description: "ID de la sede (branch) donde está ubicado el dispositivo."
          example: 2
        branch_name:
          type: string
          description: "Nombre de la sede (incluido en respuesta, no en request)."
          nullable: true
          example: "Sede San Isidro"
        ip:
          type: string
          nullable: true
          example: "192.168.1.105"
        puerto:
          type: integer
          nullable: true
          example: 4370
        ubicacion:
          type: string
          nullable: true
          example: "Puerta principal, primer piso"
        state:
          type: boolean
          description: |
            true = activo (acepta marcaciones).
            false = inactivo: marcaciones rechazadas, notificación WebSocket + email
            al trabajador y al admin con `MANAGE_DEVICES`.
          example: true
        created_at:
          type: string
          format: date-time

    DeviceListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/DeviceProfile'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    CreateDeviceRequest:
      type: object
      required:
        - code
        - branch_id
      description: |
        Registra un nuevo dispositivo biométrico en el tenant.
        El `code` (serial ZKTeco) debe ser único en el tenant.
        Requiere permiso `MANAGE_DEVICES`.
      properties:
        code:
          type: string
          example: "ZK-C2PRO-00123"
        name:
          type: string
          nullable: true
          example: "Lector Principal - Entrada Sur"
        branch_id:
          type: integer
          example: 2
        ip:
          type: string
          nullable: true
          example: "192.168.1.105"
        puerto:
          type: integer
          nullable: true
          example: 4370
        ubicacion:
          type: string
          nullable: true
          example: "Puerta principal, primer piso"

    PatchDeviceRequest:
      type: object
      minProperties: 1
      description: |
        Actualización parcial de un dispositivo.
        - `state: false` desactiva el dispositivo: marcaciones futuras rechazadas,
          notificación inmediata WebSocket + email al admin y al trabajador afectado.
        - `code` no es modificable (clave de integración con el middleware).
      properties:
        name:
          type: string
          nullable: true
        branch_id:
          type: integer
        ip:
          type: string
          nullable: true
        puerto:
          type: integer
          nullable: true
        ubicacion:
          type: string
          nullable: true
        state:
          type: boolean

    # ── UserBiometria ─────────────────────────────────────────────────────
    UserBiometriaProfile:
      type: object
      description: |
        Registro biométrico (huella digital) de un trabajador.
        Un trabajador puede tener múltiples registros (distintos dedos).
        El `template_cifrado` está cifrado con AES-256-GCM; la llave simétrica
        está cifrada con RSA-2048 pública del backend.
        **Nunca se expone `template_cifrado` ni `llave_cifrado` en respuestas GET.**
      properties:
        id:
          type: integer
          example: 5
        tenant_user_id:
          type: integer
          example: 42
        device_id:
          type: integer
          nullable: true
          description: "Dispositivo en el que se capturó la huella."
          example: 1
        device_code:
          type: string
          nullable: true
          description: "Serial del dispositivo (incluido para referencia, no almacenado aquí)."
          example: "ZK-C2PRO-00123"
        finger_index:
          type: integer
          minimum: 0
          maximum: 9
          description: |
            Índice del dedo registrado (convención ZKTeco):
            0=Pulgar Der, 1=Índice Der, 2=Medio Der, 3=Anular Der, 4=Meñique Der,
            5=Pulgar Izq, 6=Índice Izq, 7=Medio Izq, 8=Anular Izq, 9=Meñique Izq.
          example: 1
        activo:
          type: boolean
          example: true
        capturado_en:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserBiometriaListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/UserBiometriaProfile'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    InitEnrollRequest:
      type: object
      required:
        - tenant_user_id
        - device_id
        - finger_index
      description: |
        **Paso 1 del enrolamiento biométrico.**
        El frontend solicita al backend poner el dispositivo en modo enrolamiento.
        El backend almacena en Redis el token de sesión de enrolamiento con TTL de 120 segundos.
        El middleware ZKTeco consulta Redis periódicamente; al detectar el token activo,
        captura la siguiente huella como enrolamiento y llama a `POST /corehr/biometria/enroll/completar`.

        **Flujo completo:**
        ```
        Frontend → POST /corehr/biometria/enroll/iniciar → Redis (enroll_session:{device_id}:{tenant_user_id}, TTL=120s)
        Middleware → polling Redis → captura huella → POST /corehr/biometria/enroll/completar
        Backend → guarda en usuario_biometria → notifica frontend vía WebSocket
        ```

        El enrolamiento se realiza en el dispositivo de la sede asignada al trabajador.
        Requiere permiso `MANAGE_BIOMETRICS`.
      properties:
        tenant_user_id:
          type: integer
          example: 42
        device_id:
          type: integer
          description: "Dispositivo de la sede asignada al trabajador donde se realizará el enrolamiento."
          example: 1
        finger_index:
          type: integer
          minimum: 0
          maximum: 9
          example: 1

    EnrollSessionResponse:
      type: object
      description: "Respuesta de inicio de sesión de enrolamiento."
      properties:
        enroll_token:
          type: string
          description: "Token único de sesión de enrolamiento (almacenado en Redis con TTL 120s)."
          example: "enroll_a1b2c3d4e5f6"
        device_id:
          type: integer
          example: 1
        tenant_user_id:
          type: integer
          example: 42
        finger_index:
          type: integer
          example: 1
        expires_at:
          type: string
          format: date-time
          description: "Momento en que expira la sesión de enrolamiento (ahora + 120s)."

    CompleteEnrollRequest:
      type: object
      required:
        - enroll_token
        - template_cifrado
        - llave_cifrado
        - finger_index
        - device_code
      description: |
        **Paso 2 del enrolamiento biométrico — Invocado por el middleware ZKTeco.**
        El middleware capturó la huella y la envía cifrada al backend.
        El backend valida el `enroll_token` en Redis, guarda en `usuario_biometria`
        y notifica al frontend vía WebSocket (`/user/{adminId}/queue/biometria`).
        El token de Redis se consume (eliminado) tras el primer uso exitoso.
      properties:
        enroll_token:
          type: string
          description: "Token de sesión recibido del paso 1. Se valida y consume en Redis."
          example: "enroll_a1b2c3d4e5f6"
        device_code:
          type: string
          description: "Serial ZKTeco del dispositivo que capturó la huella."
          example: "ZK-C2PRO-00123"
        finger_index:
          type: integer
          minimum: 0
          maximum: 9
          example: 1
        template_cifrado:
          type: string
          description: "Plantilla biométrica cifrada AES-256-GCM."
        llave_cifrado:
          type: string
          description: "Llave AES cifrada con RSA-2048 pública del backend."
        capturado_en:
          type: string
          format: date-time

    # ── Attendance ────────────────────────────────────────────────────────
    AttendanceProfile:
      type: object
      description: |
        Registro de asistencia de un trabajador.
        Creado por el middleware biométrico al procesar una marcación.

        **Cálculo de tardanza:**
        `minutes_late = max(0, (check_in - entry_time_efectivo) - tolerancia_ENTRADA.minutes)`
        donde `entry_time_efectivo` es el `entry_time` del `user_schedule` del trabajador
        si existe, o el `entry_time` del `schedule` asignado.

        **Estados:**
        - `PUNTUAL`: llegó dentro del margen de tolerancia.
        - `TARDANZA`: `minutes_late > 0` (superó el margen de tolerancia).
        - `FALTA`: no se registró `check_in` al finalizar el turno.
      properties:
        id:
          type: string
          format: uuid
          example: "a1b2c3d4-0000-0000-0000-000000000001"
        tenant_user_id:
          type: integer
          example: 42
        tenant_user:
          type: object
          description: "Datos básicos del trabajador."
          properties:
            id:
              type: integer
            nombre:
              type: string
            apellido_paterno:
              type: string
        schedule_id:
          type: integer
          nullable: true
          example: 3
        schedule:
          nullable: true
          $ref: '#/components/schemas/ScheduleSummary'
        device_id:
          type: integer
          nullable: true
          example: 1
        device_code:
          type: string
          nullable: true
          example: "ZK-C2PRO-00123"
        check_in:
          type: string
          format: date-time
          nullable: true
          example: "2026-06-25T07:12:00Z"
        check_out:
          type: string
          format: date-time
          nullable: true
          description: "Null hasta que el trabajador marque salida."
          example: "2026-06-25T13:05:00Z"
        attendance_date:
          type: string
          format: date
          example: "2026-06-25"
        minutes_late:
          type: integer
          description: "Tardanza neta en minutos (tolerancia ya descontada). 0 si es puntual."
          example: 12
        state:
          type: string
          enum: [PUNTUAL, TARDANZA, FALTA]
          example: "TARDANZA"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AttendanceListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceProfile'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer
        scope_aplicado:
          type: string
          enum: [ALL_TENANT, MY_ASSIGNMENTS, SEDE, AREA, DEPARTAMENTO, SELF]
          example: "MY_ASSIGNMENTS"

    PatchAttendanceRequest:
      type: object
      minProperties: 1
      description: |
        Corrección manual de un registro de asistencia.
        Solo un administrador con permiso `EDIT_ATTENDANCE` puede ejecutar este endpoint.
        Genera registro en `Auditoria_sistema` tipo `UPDATE` con valores anteriores y nuevos.
      properties:
        check_in:
          type: string
          format: date-time
          nullable: true
        check_out:
          type: string
          format: date-time
          nullable: true
        state:
          type: string
          enum: [PUNTUAL, TARDANZA, FALTA]
        minutes_late:
          type: integer
          minimum: 0

    # ── NonWorkingDays ────────────────────────────────────────────────────
    NonWorkingDayProfile:
      type: object
      description: |
        Día no laborable definido por el tenant (feriado, día especial, etc.).
        Vive en `tenant_{slug}_db`; el `tenant_id` se infiere del JWT + `X-Tenant-ID`.

        **Días recurrentes (`is_recurring = true`):** el backend resuelve automáticamente
        que aplican en cualquier año futuro. No es necesario crear un registro nuevo cada año.
        El sistema evalúa el día y mes de `date` contra la fecha de consulta, ignorando el año.
      properties:
        id:
          type: integer
          example: 1
        date:
          type: string
          format: date
          example: "2026-12-25"
        description:
          type: string
          nullable: true
          example: "Navidad"
        is_recurring:
          type: boolean
          description: |
            true = aplica anualmente (ej. Navidad cada 25 de diciembre).
            false = aplica solo en la fecha exacta indicada.
          example: true
        created_at:
          type: string
          format: date-time

    NonWorkingDayListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/NonWorkingDayProfile'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    CreateNonWorkingDayRequest:
      type: object
      required:
        - date
      properties:
        date:
          type: string
          format: date
          example: "2026-12-25"
        description:
          type: string
          nullable: true
          example: "Navidad"
        is_recurring:
          type: boolean
          default: false
          example: true

    PatchNonWorkingDayRequest:
      type: object
      minProperties: 1
      properties:
        date:
          type: string
          format: date
        description:
          type: string
          nullable: true
        is_recurring:
          type: boolean

    # ── TenantContact ─────────────────────────────────────────────────────
    TenantContactProfile:
      type: object
      description: |
        Contacto del tenant: un TenantUser que actúa como punto de contacto
        para una función específica (RRHH, Soporte Técnico, CTO, etc.).
        Los datos personales (nombre, email, teléfono) se heredan del
        TenantUser referenciado (y por ende de su Persona en master_db).
        Un tenant puede tener múltiples contactos de distintos tipos.
      properties:
        id:
          type: integer
          example: 3
        tenant_user_id:
          type: integer
          example: 42
        type:
          type: string
          description: "Rol de contacto del usuario dentro del tenant."
          example: "RRHH"
        tenant_user:
          type: object
          description: "Datos heredados del TenantUser (y su Persona en master_db)."
          properties:
            id:
              type: integer
            nombre:
              type: string
            apellido_paterno:
              type: string
            email:
              type: string
              format: email
            phone:
              type: string
              nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    TenantContactListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/TenantContactProfile'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    CreateTenantContactRequest:
      type: object
      required:
        - tenant_user_id
        - type
      description: |
        Designa a un TenantUser como contacto del tenant para un tipo específico.
        Un mismo usuario puede ser contacto de múltiples tipos.
      properties:
        tenant_user_id:
          type: integer
          example: 42
        type:
          type: string
          maxLength: 50
          example: "RRHH"

    PatchTenantContactRequest:
      type: object
      required:
        - type
      description: "Actualiza el tipo de contacto de un TenantContact existente."
      properties:
        type:
          type: string
          maxLength: 50
          example: "Soporte Técnico"

    # ── TenantUserDepartment ──────────────────────────────────────────────
    TenantUserDepartmentProfile:
      type: object
      description: |
        Registro histórico de asignación de un trabajador a un departamento.
        Permite rastrear cambios de departamento a lo largo del tiempo.
        `end_date = null` indica que la asignación sigue activa.
        `is_primary = true` indica el departamento principal del trabajador.
      properties:
        id:
          type: integer
          example: 10
        tenant_user_id:
          type: integer
          example: 42
        department_id:
          type: integer
          example: 5
        department_name:
          type: string
          nullable: true
          example: "Departamento de Matemáticas"
        is_primary:
          type: boolean
          example: true
        start_date:
          type: string
          format: date
          example: "2026-01-01"
        end_date:
          type: string
          format: date
          nullable: true
          description: "null = asignación actualmente vigente."
          example: null
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TenantUserDepartmentListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/TenantUserDepartmentProfile'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    CreateTenantUserDepartmentRequest:
      type: object
      required:
        - department_id
        - start_date
      description: |
        Registra una nueva asignación de departamento para un trabajador.
        Si `is_primary = true` y el trabajador ya tiene otro departamento primario,
        el backend cierra automáticamente el anterior (`end_date = start_date - 1 día`).
        Requiere permiso `MANAGE_DEPARTMENTS`.
      properties:
        department_id:
          type: integer
          example: 5
        is_primary:
          type: boolean
          default: false
          example: true
        start_date:
          type: string
          format: date
          example: "2026-07-01"
        end_date:
          type: string
          format: date
          nullable: true
          example: null

    PatchTenantUserDepartmentRequest:
      type: object
      minProperties: 1
      description: |
        Cierra o actualiza una asignación de departamento.
        Caso más común: establecer `end_date` para cerrar la asignación activa.
      properties:
        end_date:
          type: string
          format: date
          nullable: true
          example: "2026-12-31"
        is_primary:
          type: boolean

    # ── Response Messages ───────────────────────────────────────────────
    MessageResponse:
      type: object
      description: "Respuesta informativa para operaciones asíncronas o de confirmación."
      properties:
        message:
          type: string
          description: "Mensaje legible del resultado de la operación."
          example: "Lote aceptado para procesamiento en segundo plano."
        status:
          type: string
          description: "Estado de la operación (ej. queued, accepted, processed)."
          example: "queued"
      required:
        - message

security:
  - bearerAuth: []
    tenantHeader: []

paths:
  # ----------------------------------------
  # MÓDULO: AUTENTICACIÓN Y ACCESOS
  # ----------------------------------------
  /auth/login:
    post:
      tags:
        - Autenticación
      summary: Autenticar usuario e iniciar sesión
      description: Valida credenciales contra el esquema del Tenant, actualiza 'ultimo_acceso' en BD y genera JWT.
      security:
        - tenantHeader: [] # Solo requiere la cabecera del colegio para saber a dónde apuntar
      parameters:
        - name: X-Tenant-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Autenticación exitosa.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciales erróneas o cuenta suspendida.

  # ----------------------------------------
  # MÓDULO: TENANT: /usuarios
  # Contexto: tenant_{slug}_db · Requiere X-Tenant-ID
  # ----------------------------------------
  /usuarios:
    get:
      tags:
        - Usuarios (Tenant)
      summary: Listar usuarios del tenant con visibilidad basada en permisos
      operationId: listarTenantUsuarios
      description: |
        Devuelve lista paginada de usuarios. El **scope** se resuelve automáticamente
        en el backend según los permisos del JWT:

        | Permiso del solicitante          | Scope por defecto  | Puede especificar scope |
        |----------------------------------|--------------------|------------------------|
        | `VIEW_ALL_TENANT_USERS`          | Todo el tenant     | No es necesario        |
        | `VIEW_USUARIOS` (sin VIEW_ALL)   | Solo sus asignaciones (`MY_ASSIGNMENTS`) | Sí, via `scope` |
        | Ninguno de los anteriores        | `403 Forbidden`    | No                     |

        ### Lógica de `MY_ASSIGNMENTS`
        El backend recupera las sedes, áreas y departamentos a los que el usuario
        autenticado está asignado (tabla `Usuario_tenant`, `Areas`, `Departamento`,
        `Sedes`) y filtra los TenantUsers que compartan al menos una asignación.

        ### Ampliación de scope (usuarios sin `VIEW_ALL_TENANT_USERS`)
        Si el solicitante tiene `VIEW_USUARIOS` puede ampliar usando `scope=SEDE|AREA|DEPARTAMENTO`
        con el ID correspondiente. El backend valida que el ID pertenezca al tenant
        y que el solicitante tenga asignación en esa entidad.

        **Permisos requeridos:** `VIEW_USUARIOS` o `VIEW_ALL_TENANT_USERS`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/ScopeParam'
        - $ref: '#/components/parameters/BranchIdParam'
        - $ref: '#/components/parameters/AreaIdParam'
        - $ref: '#/components/parameters/DepartamentoIdParam'
        - $ref: '#/components/parameters/StatusParam'
        - $ref: '#/components/parameters/RoleIdParam'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        "200":
          description: Lista paginada de usuarios según el scope resuelto.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUserListResponse'
        "400":
          description: "`scope=SEDE` sin `branch_id`, o `scope=AREA` sin `area_id`, etc."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: |
            Sin permiso `VIEW_USUARIOS`, o intento de ampliar scope
            a una sede/área a la que el solicitante no está asignado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Token ausente o inválido.
    post:
      tags:
        - Usuarios (Tenant)
      summary: Registrar un nuevo usuario en el tenant
      operationId: crearTenantUsuario
      description: |
        Crea un usuario dentro del tenant activo. Flujo:
        1. Busca en `master_db` si ya existe una `Persona` con el `document_value`.
           Si existe, la reutiliza. Si no, la crea.
        2. Crea el registro `Users` en `master_db` (con `tenant_id`).
        3. Crea el registro `TenantUser` en `tenant_{slug}_db`.
        4. Asigna el rol indicado (valida anti-escalation).
        5. Genera contraseña temporal → envía email → marca `must_change_password = true`.

        **Permisos requeridos:** `CREATE_USER`
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearTenantUsuarioRequest'
      responses:
        "201":
          description: Usuario creado. Se envió email con contraseña temporal.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUserProfile'
        "400":
          description: Datos inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: |
            Sin permiso `CREATE_USER`, o el `role_id` indicado tiene más permisos
            que el rol del solicitante (privilege escalation).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: El email ya está registrado en este tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: |
            Error semántico: `role_id` inexistente, `sede_id` de otro tenant, etc.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /usuarios/{id}:
    parameters:
      - $ref: '#/components/parameters/UsuarioId'
      - $ref: '#/components/parameters/TenantIdHeader'

    get:
      tags:
        - Usuarios (Tenant)
      summary: Obtener un usuario de tenant por ID
      operationId: getTenantUsuarioById
      description: |
        Devuelve el perfil extendido de un TenantUser.
        El backend valida que el usuario pertenezca al tenant del JWT.

        **Regla de visibilidad:** aplica las mismas reglas que `GET /usuarios`.
        Si el solicitante solo tiene `VIEW_USUARIOS` (sin `VIEW_ALL_TENANT_USERS`),
        solo puede ver usuarios dentro de su scope de asignaciones.

        **Permisos requeridos:** `VIEW_USUARIOS` o `VIEW_ALL_TENANT_USERS`
      responses:
        "200":
          description: Perfil extendido del usuario.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUserProfile'
        "403":
          description: El usuario no está dentro del scope del solicitante.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Usuario no encontrado en este tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Usuarios (Tenant)
      summary: Actualizar completamente un usuario de tenant
      operationId: reemplazarTenantUsuario
      description: |
        Reemplaza todos los datos editables del usuario.
        Genera registro en `Auditoria_sistema` con `valor_anterior` y `valor_nuevo` en JSONB.

        **Campos inmutables:** `document_type`, `document_value`.
        **No modifica:** `estado` (usar PATCH), contraseña (usar endpoint dedicado).

        **Permisos requeridos:** `EDIT_USER`
        **Restricción de scope:** el usuario objetivo debe estar dentro del scope del solicitante.
        **Anti-escalation:** si se cambia `role_id`, el nuevo rol no puede tener más permisos
        que el rol del solicitante.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActualizarTenantUsuarioRequest'
      responses:
        "200":
          description: Usuario actualizado. Retorna perfil completo actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUserProfile'
        "400":
          description: Datos de entrada inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: |
            Sin permiso `EDIT_USER`, usuario fuera de scope,
            o intento de privilege escalation en `role_id`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Usuario no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Conflicto de email con otro usuario del tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: "`role_id`, `sede_ids` o `area_ids` con IDs inválidos para este tenant."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags:
        - Usuarios (Tenant)
      summary: Actualizar parcialmente un usuario de tenant
      operationId: patchTenantUsuario
      description: |
        Actualiza solo los campos enviados (merge-patch, RFC 7396).
        Los arrays reemplazan la colección completa cuando se incluyen.

        **Casos de uso especiales:**
        - `{ "estado": "INACTIVO" }`: baja funcional. El usuario no puede iniciar sesión.
          Genera auditoría `DELETE_LOGICO`. Equivalente a soft-delete.
        - `{ "estado": "ACTIVO" }` sobre usuario `INACTIVO`: **reactivación**.
          Genera auditoría `REACTIVACION`. Requiere permiso `REACTIVATE_USER`.
        - `{ "estado": "LICENCIA" }`: el usuario sigue existiendo pero no puede marcar
          asistencia. No es una baja.
        - `{ "role_id": X }`: requiere permiso `ASSIGN_ROLES` y anti-escalation.

        **Permisos requeridos:** `EDIT_USER` (para campos personales),
        `ASSIGN_ROLES` (si se incluye `role_id`),
        `REACTIVATE_USER` (si `estado` pasa de `INACTIVO` a `ACTIVO`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchTenantUsuarioRequest'
            examples:
              baja_logica:
                summary: Baja lógica (soft-delete)
                value:
                  estado: "INACTIVO"
              reactivacion:
                summary: Reactivación
                value:
                  estado: "ACTIVO"
              licencia:
                summary: Poner en licencia
                value:
                  estado: "LICENCIA"
              reasignar_area:
                summary: Reasignar áreas
                value:
                  area_ids: [5, 9]
              actualizar_cargo:
                summary: Actualizar cargo
                value:
                  cargo: "Subdirector Académico"
      responses:
        "200":
          description: Usuario actualizado parcialmente. Retorna perfil completo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUserProfile'
        "400":
          description: Body vacío o campo con formato inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: |
            Alguno de:
            - Sin permiso `EDIT_USER`.
            - `role_id` sin permiso `ASSIGN_ROLES`.
            - Reactivación sin permiso `REACTIVATE_USER`.
            - Privilege escalation en `role_id`.
            - Usuario fuera del scope del solicitante.
            - Intento de modificar `document_type` o `document_value`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Usuario no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: |
            Alguno de:
            - El usuario ya tiene el estado solicitado.
            - Conflicto de email.
            - El solicitante intenta darse de baja a sí mismo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: IDs de rol, sede o área inválidos para este tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Usuarios (Tenant)
      summary: Baja lógica de un usuario de tenant (soft-delete)
      operationId: softDeleteTenantUsuario
      description: |
        Aplica baja lógica: establece `estado = INACTIVO` y registra `deleted_at`
        y `deleted_by` en `TenantUser`.

        El usuario **no se elimina físicamente**. Sus registros de asistencia,
        incidencias y auditoría se conservan durante la vigencia del tenant (3 años
        desde cancelación del tenant).

        **Post-delete:**
        - El usuario no puede iniciar sesión (Spring Security rechaza `INACTIVO`).
        - El registro aparece en `GET /usuarios?status=INACTIVO`.
        - Reversible via `PATCH /usuarios/{id}` con `{ "estado": "ACTIVO" }`.

        **Restricciones:**
        - El solicitante no puede darse de baja a sí mismo → `409`.
        - El usuario ya tiene `estado = INACTIVO` → `409`.
        - Sin permiso `DELETE_USER` → `403`.

        Genera registro en `Auditoria_sistema` tipo `DELETE`.

        **Permisos requeridos:** `DELETE_USER`
      parameters:
        - name: motivo
          in: query
          required: false
          description: "Motivo de la baja (máx 255 caracteres). Almacenado en auditoría."
          schema:
            type: string
            maxLength: 255
            example: "Trabajador retirado de la institución"
      responses:
        "200":
          description: Baja lógica aplicada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoftDeleteResponse'
        "403":
          description: Sin permiso `DELETE_USER` o usuario fuera de scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Usuario no encontrado en el tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: El solicitante intenta darse de baja a sí mismo, o el usuario ya está `INACTIVO`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
 
  # ── Rol dedicado ──────────────────────────────────────────────────────
  /usuarios/{id}/rol:
    parameters:
      - $ref: '#/components/parameters/UsuarioId'
      - $ref: '#/components/parameters/TenantIdHeader'

    put:
      tags:
        - Usuarios (Tenant)
      summary: Reasignar el rol de un usuario de tenant
      operationId: asignarRolTenantUsuario
      description: |
        Endpoint dedicado para reasignación de rol, diseñado para el modal
        de gestión de roles en el frontend Angular. Evita enviar todo el perfil
        del usuario solo para cambiar el rol.

        Aplica la misma regla anti-escalation que PUT y PATCH:
        el nuevo rol no puede tener más permisos que el rol del solicitante.

        Genera registro en `Auditoria_sistema` con `valor_anterior`
        (rol anterior) y `valor_nuevo` (rol nuevo).

        **Permisos requeridos:** `ASSIGN_ROLES`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarRolRequest'
      responses:
        "200":
          description: Rol reasignado. Retorna el perfil completo actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUserProfile'
        "403":
          description: Sin permiso `ASSIGN_ROLES` o privilege escalation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Usuario o rol no encontrado en este tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: El `role_id` no existe en este tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  # Endpoint para cambio de contraseña
  /usuarios/{id}/password:
    parameters:
      - $ref: '#/components/parameters/UsuarioId'
      - $ref: '#/components/parameters/TenantIdHeader'
 
    patch:
      tags:
        - Usuarios
      summary: Cambiar contraseña de un usuario
      operationId: changePassword
      description: |
        **Dos flujos posibles:**

        **Flujo 1 — Primer login (forzado):** el JWT tiene `must_change_password = true`.
        El solicitante es el mismo usuario (`id` del path == `sub` del JWT).
        No se requiere `current_password`. Al completar, el backend marca
        `must_change_password = false` y el usuario accede normalmente.

        **Flujo 2 — Cambio voluntario:** `must_change_password = false`.
        `current_password` es obligatoria. Si es incorrecta → `403`.

        **Flujo 3 — Reset administrativo:** el solicitante es distinto al usuario objetivo
        y tiene permiso `RESET_PASSWORD`. No requiere `current_password`. El sistema
        genera nueva contraseña temporal → envía email → marca `must_change_password = true`.
        En este caso `new_password` se ignora (el backend genera la contraseña).

        Genera registro en `Auditoria_sistema` tipo `UPDATE` (solo el campo `password_hash`,
        sin valores en `valor_anterior` / `valor_nuevo` por seguridad).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CambiarPasswordRequest'
      responses:
        "204":
          description: Contraseña actualizada exitosamente. Sin cuerpo de respuesta.
        "400":
          description: Nueva contraseña no cumple políticas mínimas de seguridad.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: |
            `current_password` incorrecta (cuando es requerida),
            o el rol no tiene permiso `RESET_PASSWORD` para resetear contraseñas de terceros.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Usuario no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Token JWT ausente, expirado o inválido.
   # Endpoint auxiliar para que los trabajadores puedan ver su propio perfil sin necesidad de conocer su ID
  /usuarios/me:
    get:
      tags:
        - Usuarios
      summary: Obtener el perfil del usuario autenticado
      operationId: getUsuarioMe
      description: |
        Shortcut que devuelve el perfil del usuario que porta el JWT.
        Accesible por **todos los roles** incluyendo `TRABAJADOR`.
        Equivale a `GET /usuarios/{mi_id}` pero sin necesidad de conocer el propio ID.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        "200":
          description: Perfil del usuario autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUserProfile'
        "401":
          description: Token JWT ausente, expirado o inválido.
 
    patch:
      tags:
        - Usuarios
      summary: El usuario actualiza su propio perfil
      operationId: patchUsuarioMe
      description: |
        Permite auto-edición de datos no sensibles. Cualquier usuario de tenant
        puede usar este endpoint sin permisos adicionales.

        **Campos permitidos:** `phone`, `img_url`.
        **Campos bloqueados** (siempre `403`): `email`, `role_id`,
        `estado`, `sede_ids`, `area_ids`, `departamento_ids`.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                phone:
                  type: string
                  nullable: true
                  example: "+51987654321"
                img_url:
                  type: string
                  format: uri
                  nullable: true
                  example: "https://r2.trazzo.pe/profiles/76543210.jpg"
      responses:
        "200":
          description: Perfil actualizado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUserProfile'
        "400":
          description: Body vacío o formato inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Intento de modificar un campo restringido para auto-edición.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Token JWT ausente, expirado o inválido.
