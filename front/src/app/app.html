<app-toast></app-toast>

@if (router.url.startsWith('/tenant') || router.url.startsWith('/sass') || router.url.startsWith('/usuario')) {
	<div class="app-shell" [class.app-shell--sidebar-open]="roleService.sidebarOpen()">
		@if (roleService.sidebarOpen()) {
			<div class="app-shell__backdrop" (click)="roleService.closeSidebar()" (keydown.enter)="roleService.closeSidebar()" role="button" tabindex="0"></div>
		}

		<aside class="app-shell__sidebar">
			<app-sidebar></app-sidebar>
		</aside>

		<header class="app-shell__header">
			<app-header></app-header>
		</header>

		<main class="app-shell__content">
			<router-outlet></router-outlet>
		</main>
	</div>
} @else {
	<router-outlet></router-outlet>
}
