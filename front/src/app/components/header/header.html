<div class="header-shell">
	<div class="header-shell__search input-group">
		<span class="input-group-text"><i class="bi bi-search"></i></span>
		<input type="search" class="form-control" placeholder="Buscar recursos, empleados..." aria-label="Buscar recursos, empleados">
	</div>

	<div class="header-shell__actions">
		<div class="dropdown">
			<button type="button" class="icon-button has-alert" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Notificaciones">
				<i class="bi bi-bell"></i>
				<span class="notification-dot"></span>
			</button>
			<div class="dropdown-menu dropdown-menu-end py-0 notif-dropdown">
				<div class="dropdown-header fw-semibold fs-small px-3 py-2">Notificaciones</div>
				@for (notif of notificaciones; track notif.titulo) {
					<button type="button" class="dropdown-item d-flex align-items-start gap-2 px-3 py-2">
						<i class="bi mt-1" [class]="notif.icono" [style.color]="tipoColor[notif.tipo]"></i>
						<div class="d-flex flex-column lh-sm">
							<small class="fw-semibold">{{ notif.titulo }}</small>
							<small class="text-body-secondary">{{ notif.descripcion }}</small>
							<small class="text-body-tertiary">{{ notif.hora }}</small>
						</div>
					</button>
				}
				<div class="dropdown-divider m-0"></div>
				<button type="button" class="dropdown-item text-center small py-2">Ver todas</button>
			</div>
		</div>

		<a class="icon-button" [routerLink]="settingsUrl()" aria-label="Configuración">
			<i class="bi bi-gear"></i>
		</a>

		<div class="dropdown">
			<button type="button" class="icon-button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Ayuda">
				<i class="bi bi-question-circle"></i>
			</button>
			<ul class="dropdown-menu dropdown-menu-end">
				<li><button type="button" class="dropdown-item"><i class="bi bi-book me-2"></i>Guía de uso</button></li>
				<li><button type="button" class="dropdown-item"><i class="bi bi-chat-dots me-2"></i>Soporte técnico</button></li>
				<li><button type="button" class="dropdown-item"><i class="bi bi-info-circle me-2"></i>Acerca de Trazzo</button></li>
			</ul>
		</div>

		<div class="user-chip dropdown">
			<div class="user-chip__info" data-bs-toggle="dropdown" aria-expanded="false" role="button">
				<strong>Jose Alata</strong>
				<span>{{ roleService.roleLabel[roleService.role()] }}</span>
			</div>
			<button type="button" class="user-chip__toggle" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Cambiar rol">
				<i class="bi bi-chevron-down"></i>
			</button>
			<ul class="dropdown-menu dropdown-menu-end mt-2">
				@for (rol of roles; track rol.value) {
					<li>
						<button type="button" class="dropdown-item" (click)="roleService.switchRole(rol.value)">
							@if (roleService.role() === rol.value) {
								<i class="bi bi-check-lg me-2"></i>
							} @else {
								<span class="ms-4"></span>
							}
							{{ rol.label }}
						</button>
					</li>
				}
			</ul>
		</div>
	</div>
</div>
