<div class="header-shell">
	<div class="header-shell__search input-group">
		<span class="input-group-text"><i class="bi bi-search"></i></span>
		<input type="search" class="form-control" placeholder="Buscar recursos, empleados..." aria-label="Buscar recursos, empleados">
	</div>

	<div class="header-shell__actions">
		<button type="button" class="icon-button has-alert" aria-label="Notificaciones">
			<i class="bi bi-bell"></i>
			<span class="notification-dot"></span>
		</button>

		<button type="button" class="icon-button" aria-label="Configuración">
			<i class="bi bi-gear"></i>
		</button>

		<button type="button" class="icon-button" aria-label="Ayuda">
			<i class="bi bi-question-circle"></i>
		</button>

		<div class="user-chip dropdown">
			<div class="user-chip__info">
				<strong>Jose Alata</strong>
				<span>Administrador</span>
			</div>
			<button type="button" class="user-chip__toggle" aria-label="Abrir menú de usuario">
				<i class="bi bi-chevron-down"></i>
			</button>
		</div>
	</div>
</div>
