<div class="help-page">
  <div class="help-page__container">
    <nav class="help-page__nav">
      <button type="button" class="help-page__back" (click)="location.back()">
        <i class="bi bi-arrow-left"></i> Volver
      </button>

      <div class="help-page__nav-links">
        @for (section of sections; track section.id) {
          <a class="help-page__nav-link" [class.active]="section.id === content.id" [routerLink]="['/ayuda', section.id]">
            {{ section.title }}
          </a>
        }
      </div>
    </nav>

    <h1 class="help-page__title">{{ content.title }}</h1>
    <p class="help-page__intro">{{ content.intro }}</p>

    @for (item of content.items; track item.title) {
      <section class="help-page__section">
        <h2 class="help-page__section-title">
          <i class="bi" [class]="item.icon"></i>{{ item.title }}
        </h2>
        <p>{{ item.description }}</p>
      </section>
    }

    <div class="help-page__pager">
      @if (prev) {
        <a class="help-page__pager-link help-page__pager-link--prev" [routerLink]="['/ayuda', prev.id]">
          <i class="bi bi-chevron-left"></i>
          <span>{{ prev.title }}</span>
        </a>
      } @else {
        <span></span>
      }

      @if (next) {
        <a class="help-page__pager-link help-page__pager-link--next" [routerLink]="['/ayuda', next.id]">
          <span>{{ next.title }}</span>
          <i class="bi bi-chevron-right"></i>
        </a>
      }
    </div>
  </div>
</div>
