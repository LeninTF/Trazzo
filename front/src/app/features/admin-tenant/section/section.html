<section class="section-page">
	<div class="section-page__hero">
		<div class="section-page__icon">
			<i [class]="'bi ' + section.icon"></i>
		</div>
		<div>
			<p class="section-page__eyebrow mb-2">Panel administrativo</p>
			<h1 class="section-page__title mb-2">{{ section.title }}</h1>
			<p class="section-page__subtitle mb-0">{{ section.subtitle }}</p>
		</div>
	</div>

	<div class="section-page__card">
		<div class="section-page__card-header">
			<strong>Vista inicial</strong>
			<span>Diseñada para integrarse con el sidebar fijo</span>
		</div>
		<div class="section-page__card-body">
			<p>
				El contenido principal de esta sección puede crecer después sin tocar el layout. El header y el sidebar permanecen fijos mientras navegas.
			</p>
		</div>
	</div>
</section>
