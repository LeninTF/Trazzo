services:
  trazzo-backend:
    # 1. build para compilar localmente
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: trazzo-backend-local
    # 2. Exponemos el puerto para que el frontend local pueda hablarle
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - DB_URL=jdbc:postgresql://postgres-local:5432/trazzo_dev_db
      - DB_USER=postgres
      - DB_PASSWORD=admin
      - PROVISIONING_ADMIN_URL=jdbc:postgresql://postgres-local:5432/postgres
      - PROVISIONING_ADMIN_USER=postgres
      - PROVISIONING_ADMIN_PASS=admin
      - PROVISIONING_DB_HOST=postgres-local
      - PROVISIONING_DB_PORT=5432
      - MERCADOPAGO_ACCESS_TOKEN=${MERCADOPAGO_ACCESS_TOKEN:-}
      - MERCADOPAGO_PUBLIC_KEY=${MERCADOPAGO_PUBLIC_KEY:-}
      - MERCADOPAGO_WEBHOOK_SECRET=${MERCADOPAGO_WEBHOOK_SECRET:-}
      # Mercado Pago's preapproval API rejects back_url values pointing at localhost
      # ("Invalid value for back_url, must be a valid URL"), so the default here must be a
      # real, publicly-resolvable HTTPS URL even for local dev — override with FRONTEND_URL
      # only if you need redirects to actually land on a different host.
      - FRONTEND_URL=${FRONTEND_URL:-https://www.trazzo.pe}
      - ABANDONED_TRIAL_HOURS=${ABANDONED_TRIAL_HOURS:-24}
      - ABANDONED_TRIAL_CLEANUP_CRON=${ABANDONED_TRIAL_CLEANUP_CRON:-0 0 * * * *}
    networks:
      - trazzo-local-net

  trazzo-frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: trazzo-frontend-local
    # 3. Exponemos el puerto 8080 hacia tu localhost:4000
    ports:
      - "4000:8080"
    networks:
      - trazzo-local-net
    depends_on:
      - trazzo-backend

  # Incluimos la BD aquí para que el backend contenedorizado tenga donde conectarse
  postgres-local:
    image: postgres:15-alpine
    container_name: trazzo-db-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: trazzo_dev_db
    ports:
      - "5433:5432"
    networks:
      - trazzo-local-net

networks:
  trazzo-local-net:
    driver: bridge