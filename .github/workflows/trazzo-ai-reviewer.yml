name: Trazzo AI PR Agent (Qodo OSS + Gemini)

# Permisos estrictos necesarios para leer el código y escribir comentarios
permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Esto permite usar comandos en los comentarios del PR como "/review" o "/describe"
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.repository }}-${{ github.event.number || github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  pr_agent_review:
    runs-on: ubuntu-latest
    name: Revisión DevSecOps
    # Evita que el agente responda a dependabot o a sí mismo
    if: ${{ github.event.sender.type != 'Bot' }}
    
    steps:
      - name: 🚀 Ejecutando Trazzo AI Agent
        uses: Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # 1. Configuración de Modelos (Qodo usa LiteLLM por debajo, por eso el prefijo gemini/)
          CONFIG.MODEL: "gemini/gemini-1.5-pro-latest"
          CONFIG.FALLBACK_MODELS: "gemini/gemini-2.5-flash"
          
          # 2. El Cerebro: Instrucciones para la revisión de código
          PR_REVIEWER.EXTRA_INSTRUCTIONS: |
            Eres el agente revisor de código de Trazzo, un Tech Lead experto en DevSecOps, Java Spring Boot (Arquitectura Hexagonal) y Angular.
            1. AGRUPACIÓN POR IMPACTO: Agrupa tus sugerencias estrictamente usando estas etiquetas: [🔴 Crítico] (Seguridad/Arquitectura), [🟡 Moderado] (Rendimiento/Estado), [🟢 Menor] (Typos/Clean Code).
            2. COMENTARIOS EN LÍNEA: Para cada error detectado, tu respuesta DEBE tener el formato:
               - Descripción del Problema: Explicación técnica.
               - Prompt Sugerido: Un bloque de código con un prompt literal que el desarrollador pueda copiar y pegar en su IDE (Cursor/Copilot) para arreglar el fallo.
          
          # 3. Instrucciones para la descripción automática del PR
          PR_DESCRIPTION.EXTRA_INSTRUCTIONS: |
            Genera un resumen estructurado indicando exactamente:
            - QUÉ se hizo (Objetivo general).
            - CÓMO se hizo (Estrategia técnica implementada).
            - DÓNDE se hicieron (Módulos afectados: ej. corehr, saasglobal, frontend).