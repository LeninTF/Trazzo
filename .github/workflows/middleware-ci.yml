name: CI/CD Middleware Biométrico

on:
  push:
    branches: [master, 'feature/**']
    paths:
      - 'middleware/**'
      - '.github/workflows/middleware-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'middleware/**'

defaults:
  run:
    working-directory: middleware

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Compilar y ejecutar los 86 tests
  # ─────────────────────────────────────────────
  test:
    name: Tests (.NET 10 / win-x64)
    runs-on: windows-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restaurar dependencias
        run: dotnet restore Trazzo.Biometric.Agent.Tests/Trazzo.Biometric.Agent.Tests.csproj

      - name: Ejecutar tests
        run: dotnet test Trazzo.Biometric.Agent.Tests/Trazzo.Biometric.Agent.Tests.csproj -c Release --no-restore --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Subir resultados de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: middleware/TestResults/*.trx

  # ─────────────────────────────────────────────
  # Job 2: Generar el instalador .msi
  # Depende de que los tests pasen primero.
  # ─────────────────────────────────────────────
  package:
    name: Build MSI (WiX v4 / x64)
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # Decodifica la DLL propietaria del ZK9500 almacenada como secret Base64.
      # Para registrar el secret: Settings → Secrets → Actions → ZKFP_DLL_BASE64
      # Comando para generar el valor: [Convert]::ToBase64String([IO.File]::ReadAllBytes("ruta\libzkfpcsharp.dll"))
      - name: Decodificar ZKTeco SDK DLL (libzkfpcsharp x64)
        shell: pwsh
        env:
          ZKFP_DLL_BASE64: ${{ secrets.ZKFP_DLL_BASE64 }}
        run: |
          $dllDir  = "Trazzo.Biometric.Agent\Native\x64"
          $dllPath = "$dllDir\libzkfpcsharp.dll"
          New-Item -ItemType Directory -Force -Path $dllDir | Out-Null
          $bytes = [Convert]::FromBase64String($env:ZKFP_DLL_BASE64)
          [System.IO.File]::WriteAllBytes("$PWD\$dllPath", $bytes)
          Write-Host "libzkfpcsharp.dll lista: $($bytes.Length) bytes"

      - name: Compilar MSI (WiX Toolset v4)
        run: dotnet build Trazzo.Biometric.Agent.Installer/Trazzo.Biometric.Agent.Installer.wixproj -c Release

      - name: Subir MSI (Español) como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Trazzo.Biometric.Agent-es-ES-build${{ github.run_number }}
          path: middleware/Trazzo.Biometric.Agent.Installer/bin/Release/es-ES/Trazzo.Biometric.Agent.msi

      - name: Subir MSI (English) como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Trazzo.Biometric.Agent-en-US-build${{ github.run_number }}
          path: middleware/Trazzo.Biometric.Agent.Installer/bin/Release/en-US/Trazzo.Biometric.Agent.msi
