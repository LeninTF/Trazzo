name: CI/CD Middleware Biométrico

on:
  push:
    branches: [master, 'feature/**', 'middleware-workflow']
    paths:
      - 'middleware/**'
      - '.github/workflows/middleware-ci.yml'
  pull_request:
    paths:
      - 'middleware/**'
      - '.github/workflows/middleware-ci.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: middleware

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Compilar, Testear, Cobertura y SonarCloud
  # ─────────────────────────────────────────────
  build-test-analyze:
    name: Análisis, Tests y Build (.NET 10 / win-x64)
    runs-on: windows-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Requerido por SonarCloud

      - name: Configurar Java JDK 17 (Requerido por SonarScanner)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # ANTES de compilar para que MSBuild encuentre la referencia
      - name: Decodificar ZKTeco SDK DLL (libzkfpcsharp x64)
        shell: pwsh
        env:
          ZKFP_DLL_BASE64: ${{ secrets.ZKFP_DLL_BASE64 }}
        run: |
          $dllDir  = "Trazzo.Biometric.Agent\Native\x64"
          $dllPath = "$dllDir\libzkfpcsharp.dll"
          New-Item -ItemType Directory -Force -Path $dllDir | Out-Null
          $bytes = [Convert]::FromBase64String($env:ZKFP_DLL_BASE64)
          [System.IO.File]::WriteAllBytes("$PWD\$dllPath", $bytes)
          Write-Host "libzkfpcsharp.dll lista: $($bytes.Length) bytes"

      - name: Instalar SonarCloud scanner para .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Iniciar análisis de SonarCloud (Begin)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin `
            /k:"methodsync-trazzo-middleware" `
            /o:"methodsync" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" `
            /d:sonar.cs.cobertura.reportsPaths="TestResults\*\coverage.cobertura.xml" `
            /d:sonar.coverage.exclusions="**/ZKTeco/ZKTecoNativeSdk.cs,**/Program.cs,**/Properties/**" `
            /d:sonar.exclusions="**/Native/**,**/bin/**,**/obj/**,**/tmp-agent-test/**"

      - name: Restaurar dependencias
        run: dotnet restore Trazzo.Biometric.Agent.Tests/Trazzo.Biometric.Agent.Tests.csproj

      - name: Compilar (Build)
        run: dotnet build Trazzo.Biometric.Agent.Tests/Trazzo.Biometric.Agent.Tests.csproj -c Debug --no-restore

      - name: Ejecutar Pruebas Unitarias y Cobertura (Coverlet)
        run: >
          dotnet test Trazzo.Biometric.Agent.Tests/Trazzo.Biometric.Agent.Tests.csproj
          -c Debug
          --no-restore
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"
          --settings Trazzo.Biometric.Agent.Tests/coverlet.runsettings

      - name: Finalizar análisis de SonarCloud (End)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Verificar Quality Gate de SonarCloud
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          scanMetadataReportFile: middleware/.sonarqube/out/.sonar/report-task.txt

      - name: Subir resultados de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: middleware/TestResults/

  # ─────────────────────────────────────────────
  # Job 2: Publicar y Generar el instalador .msi (WiX v4)
  # ─────────────────────────────────────────────
  package-msi:
    name: Build MSI (WiX v4 / Self-Contained)
    runs-on: windows-latest
    needs: build-test-analyze

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Decodificar ZKTeco SDK DLL (Requerido para el empaquetado)
        shell: pwsh
        env:
          ZKFP_DLL_BASE64: ${{ secrets.ZKFP_DLL_BASE64 }}
        run: |
          $dllDir  = "Trazzo.Biometric.Agent\Native\x64"
          $dllPath = "$dllDir\libzkfpcsharp.dll"
          New-Item -ItemType Directory -Force -Path $dllDir | Out-Null
          $bytes = [Convert]::FromBase64String($env:ZKFP_DLL_BASE64)
          [System.IO.File]::WriteAllBytes("$PWD\$dllPath", $bytes)

      - name: Compilar MSI (Self-Contained / win-x64)
        run: dotnet build Trazzo.Biometric.Agent.Installer/Trazzo.Biometric.Agent.Installer.wixproj -c Release -p:RuntimeIdentifier=win-x64 -p:SelfContained=true

      - name: Subir MSI (Español) como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Trazzo.Biometric.Agent-es-ES-build${{ github.run_number }}
          path: middleware/Trazzo.Biometric.Agent.Installer/bin/Release/es-ES/Trazzo.Biometric.Agent.msi
