name: CI/CD Backend Spring Boot

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'back/**'  # Solo se ejecuta si los archivos dentro del backend cambian
  push:
    branches: [ "main" ]
    paths:
      - 'back/**'

jobs:
  build-back:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y Testear (Maven)
        run: mvn -f back/pom.xml clean verify

      - name: Construir Imagen Docker Backend
        run: docker build -t trazzo-back:latest ./back