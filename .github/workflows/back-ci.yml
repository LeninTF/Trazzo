name: CI/CD Backend Spring Boot

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
    paths:
      - 'back/**'

permissions:
  contents: write # required by setup-java to submit dependency snapshot

jobs:
  build-back:
    runs-on: ubuntu-latest
    name: Compilar y Analizar Backend
    steps:
      - name: Checkout del código
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configurar Java JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y Testear (Maven)
        run: mvn -f back/pom.xml clean verify

      - name: Análisis Estático y Quality Gate (SonarCloud)
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -f back/pom.xml -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar \
          -Dsonar.projectKey=methodsync-trazzo-back \
          -Dsonar.organization=methodsync \
          -Dsonar.sources=src/main,pom.xml,Dockerfile \
          -Dsonar.coverage.jacoco.xmlReportPaths="**/target/site/jacoco/jacoco.xml" \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.qualitygate.wait=true

