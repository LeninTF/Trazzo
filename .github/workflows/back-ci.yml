name: CI/CD Backend Spring Boot

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - 'back/**'  # Solo se ejecuta si los archivos dentro del backend cambian
  push:
    branches: [ "master" ]
    paths:
      - 'back/**'

jobs:
  build-back:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y Testear (Maven)
        run: mvn -f back/pom.xml clean verify
      
      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadatos (etiquetas) para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/trazzo-back

      - name: Construir y Empujar (Push) Imagen Backend
        uses: docker/build-push-action@v5
        with:
          context: ./back
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha # Usa el caché nativo de GitHub Actions
          cache-to: type=gha,mode=max