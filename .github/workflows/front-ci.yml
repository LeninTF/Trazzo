name: CI/CD Frontend Angular

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - 'front/**' # Solo se ejecuta si los archivos dentro del frontend cambian
  push:
    branches: [ "master" ]
    paths:
      - 'front/**'

permissions:
  contents: read
  packages: write

jobs:
  build-front:
    runs-on: ubuntu-latest
    name: Compilar y Analizar Frontend
    steps:
      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11
      - name: Checkout del código
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: 'pnpm'
          cache-dependency-path: front/pnpm-lock.yaml

      - name: Instalar Dependencias
        run: pnpm install
        working-directory: ./front

#      Detector de Dependencias Circulares
      - name: Auditoría de Dependencias Circulares (Madge)
        run: npx madge --circular --extensions ts ./src
        working-directory: ./front

#      Si no hay dependencias circulares, procedemos a compilar
      - name: Compilar Angular
        run: pnpm run build --configuration=production
        working-directory: ./front

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadatos (etiquetas) para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/trazzo-front

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y Empujar (Push) Imagen Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha # Usa el caché nativo de GitHub Actions
          cache-to: type=gha,mode=max
