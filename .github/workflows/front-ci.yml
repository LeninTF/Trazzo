name: CI/CD Frontend Angular

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]
    paths:
      - 'front/**'

permissions:
  contents: read
  packages: write

jobs:
  build-front:
    runs-on: ubuntu-latest
    name: Compilar y Analizar Frontend
    steps:
      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11
      - name: Checkout del código
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'pnpm'
          cache-dependency-path: front/pnpm-lock.yaml

      - name: Instalar Dependencias
        run: pnpm install --frozen-lockfile
        working-directory: ./front

      #      Detector de Dependencias Circulares
      - name: Auditoría de Dependencias Circulares (Madge)
        run: npx madge --circular --extensions ts ./src
        working-directory: ./front

      - name: Análisis Estático y Quality Gate (SonarCloud Frontend)
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ./front
          args: >
            -Dsonar.projectName="Trazzo Frontend (Angular)"
            -Dsonar.projectKey=methodsync-trazzo-front
            -Dsonar.organization=methodsync
            -Dsonar.sources=src,Dockerfile
            -Dsonar.exclusions=**/node_modules/**,**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

      - name: Verificar Quality Gate de SonarCloud
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          scanMetadataReportFile: front/.scannerwork/report-task.txt

      #      Si no hay dependencias circulares, procedemos a compilar
      - name: Compilar Angular
        run: pnpm run build --configuration=production
        working-directory: ./front

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadatos (etiquetas) para Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/trazzo-front

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Construir y Empujar (Push) Imagen Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./front
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha # Usa el caché nativo de GitHub Actions
          cache-to: type=gha,mode=max
