name: Nginx Config Validation

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - 'front/nginx.conf'
      - 'front/Dockerfile'
  push:
    branches: [ "master" ]
    paths:
      - 'front/nginx.conf'
      - 'front/Dockerfile'

permissions:
  contents: read

jobs:
  validate-config:
    runs-on: ubuntu-latest
    name: Validate Nginx Config & Docker Build
    steps:
      - name: Checkout del código
        uses: actions/checkout@v6

      - name: Validar sintaxis de nginx.conf
        run: |
          docker run --rm -v "${{ github.workspace }}/front/nginx.conf:/etc/nginx/conf.d/default.conf" \
            nginx:alpine nginx -t 2>&1
        shell: bash

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Construir imagen frontend
        uses: docker/build-push-action@v7
        with:
          context: ./front
          push: false
          load: true
          tags: trazzo-front-test:ci

      - name: Verificar que el contenedor inicia sin errores de nginx
        run: |
          CONTAINER_ID=$(docker run -d trazzo-front-test:ci)
          sleep 3
          LOGS=$(docker logs "$CONTAINER_ID" 2>&1 || true)
          docker stop "$CONTAINER_ID" > /dev/null 2>&1 || true
          docker rm "$CONTAINER_ID" > /dev/null 2>&1 || true

          if echo "$LOGS" | grep -qi "emerg"; then
            echo "❌ ERROR: nginx encontró un problema crítico (emerg):"
            echo "$LOGS" | grep -i "emerg"
            exit 1
          fi

          if echo "$LOGS" | grep -qi "permission denied"; then
            echo "❌ ERROR: nginx tiene errores de permisos:"
            echo "$LOGS" | grep -i "permission denied"
            exit 1
          fi

          if echo "$LOGS" | grep -qi "cannot"; then
            echo "❌ ERROR: nginx no pudo arrancar:"
            echo "$LOGS"
            exit 1
          fi

          echo "✅ Contenedor inició correctamente sin errores críticos de nginx"
