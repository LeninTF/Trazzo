name: Nginx Config Validation

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'front/nginx.conf'
      - 'front/Dockerfile'
  push:
    branches: [ "main" ]
    paths:
      - 'front/nginx.conf'
      - 'front/Dockerfile'

permissions:
  contents: read

jobs:
  validate-config:
    runs-on: ubuntu-latest
    name: Validate Nginx Config & Docker Build
    steps:
      - name: Checkout del código
        uses: actions/checkout@v7

      - name: Validar sintaxis de nginx.conf
        run: |
          docker run --rm -v "${{ github.workspace }}/front/nginx.conf:/etc/nginx/conf.d/default.conf" \
            nginx:alpine nginx -t 2>&1
        shell: bash

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Construir imagen frontend
        uses: docker/build-push-action@v7
        with:
          context: ./front
          push: false
          load: true
          tags: trazzo-front-test:ci

      - name: Verificar que el contenedor inicia sin errores de nginx
        run: |
          CONTAINER_ID=$(docker run -d trazzo-front-test:ci)
          sleep 3

          # 1. Verificar estado del contenedor con docker inspect
          STATUS=$(docker inspect "$CONTAINER_ID" --format='{{.State.Status}}' 2>/dev/null)
          EXIT_CODE=$(docker inspect "$CONTAINER_ID" --format='{{.State.ExitCode}}' 2>/dev/null)

          if [ "$STATUS" != "running" ]; then
            echo "❌ ERROR: el contenedor no está en ejecución (status=$STATUS, exit_code=$EXIT_CODE)"
            docker logs "$CONTAINER_ID" 2>&1 || true
            docker rm -f "$CONTAINER_ID" > /dev/null 2>&1 || true
            exit 1
          fi

          # 2. Revisar logs en busca de errores críticos
          LOGS=$(docker logs "$CONTAINER_ID" 2>&1 || true)

          if echo "$LOGS" | grep -qi "emerg"; then
            echo "❌ ERROR: nginx encontró un problema crítico (emerg):"
            echo "$LOGS"
            docker stop "$CONTAINER_ID" > /dev/null 2>&1 || true
            docker rm "$CONTAINER_ID" > /dev/null 2>&1 || true
            exit 1
          fi

          if echo "$LOGS" | grep -qi "permission denied"; then
            echo "❌ ERROR: nginx tiene errores de permisos:"
            echo "$LOGS"
            docker stop "$CONTAINER_ID" > /dev/null 2>&1 || true
            docker rm "$CONTAINER_ID" > /dev/null 2>&1 || true
            exit 1
          fi

          if echo "$LOGS" | grep -qi "cannot"; then
            echo "❌ ERROR: nginx no pudo arrancar:"
            echo "$LOGS"
            docker stop "$CONTAINER_ID" > /dev/null 2>&1 || true
            docker rm "$CONTAINER_ID" > /dev/null 2>&1 || true
            exit 1
          fi

          docker stop "$CONTAINER_ID" > /dev/null 2>&1 || true
          docker rm "$CONTAINER_ID" > /dev/null 2>&1 || true

          echo "✅ Contenedor inició correctamente sin errores críticos de nginx"
