version: 2
updates:
  # 1. Configuración para el Backend (Java / Maven)
  - package-ecosystem: "maven"
    directory: "/back" # Esta ruta apunta a la carpeta del backend
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(back)"
    groups:
      # Agrupará todas las dependencias de Spring Boot en un solo Pull Request
      spring-boot-updates:
        patterns:
          - "org.springframework.boot:*"
      # Agrupará cualquier otra actualización de Maven en otro Pull Request
      all-other-maven:
        patterns:
          - "*"

  # 2. Configuración para el Frontend (Angular / pnpm)
  - package-ecosystem: "npm" # CRÍTICO: Se usa 'npm' aunque uses pnpm
    directory: "/front" # Esta ruta apunta a la carpeta del frontend
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(front)"
    groups:
      # Agrupará todas las dependencias del ecosistema Angular en un solo PR
      angular-updates:
        patterns:
          - "@angular/*"
      # Agrupará el resto de librerías del frontend
      all-other-frontend:
        patterns:
          - "*"

  # 3. Configuración para el Middleware (C# / .NET)
#  - package-ecosystem: "nuget"
#    directory: "/middleware"
#    schedule:
#      interval: "weekly"
#      day: "monday"
#    commit-message:
#      prefix: "chore(middleware)"
#    groups:
#      dotnet-updates:
#        patterns:
#          - "*"

  # 4. Configuración para los propios Workflows de GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci(actions)"
    groups:
      actions-updates:
        patterns:
          - "*"